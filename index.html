<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Running Art</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  /* 深色（預設）與淺色主題都用這組變數，只有 body.light 覆寫。
     強調色（藍/綠/紅）兩種主題共用，不放進來。 */
  :root{
    /* color-scheme 讓原生控制項（拉桿、捲軸）跟著主題，而不是跟著作業系統。
       少了它，淺色主題下的 range 拉桿在深色系統上會是深色的。 */
    color-scheme:dark;
    --bg:#0d0f12; --panel:#14171c; --panel2:#171b21; --panel3:#0f1216;
    --border:#262b33; --border2:#3a4048;
    --text:#e8eaed; --text2:#c9cdd3; --dim:#8b929c;
    --glass:rgba(20,23,28,.9); --scrim:rgba(6,8,11,.72);
    /* CARTO dark_all 的道路偏暗，提亮讓街道看得清楚 */
    --tile-filter:brightness(1.5) contrast(1.04);
  }
  body.light{
    color-scheme:light;
    --bg:#eef1f5; --panel:#ffffff; --panel2:#eef1f6; --panel3:#e6eaf0;
    --border:#d3d9e2; --border2:#c2cad6;
    --text:#1a1d22; --text2:#3a4048; --dim:#6b727d;
    --glass:rgba(255,255,255,.9); --scrim:rgba(30,40,55,.45);
    --tile-filter:none;   /* light_all 底圖本來就亮，不用再提 */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;
    font-family:system-ui,-apple-system,"Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--text)}
  #map{position:absolute;inset:0;background:var(--bg)}
  .leaflet-container{background:var(--bg)}
  .leaflet-tile-pane{filter:var(--tile-filter)}

  /* ---- 頂部 ---- */
  .top{position:absolute;top:0;left:0;right:0;z-index:500;padding:10px 12px;
    display:flex;gap:8px;align-items:center;pointer-events:none}
  .top>*{pointer-events:auto}
  .brand{font-size:15px;font-weight:700;letter-spacing:.5px;
    background:var(--glass);backdrop-filter:blur(8px);
    border:1px solid var(--border);border-radius:10px;padding:8px 12px}
  .btn-dl{display:flex;align-items:center;gap:6px;
    background:var(--glass);backdrop-filter:blur(8px);
    border:1px solid var(--border);color:var(--text);border-radius:10px;
    padding:9px 13px;font-size:13px;font-weight:500}
  .btn-dl.push{margin-left:auto}
  .btn-dl.on{background:#2563eb;border-color:#2563eb;color:#fff}
  /* 圖示按鈕鎖死 38×38，內容置中：不管裝 SVG 或「EN」/「中」文字，大小都一致
     （拉丁字母與 CJK 行高不同，不鎖高度會讓語言按鈕看起來忽大忽小） */
  .icon-btn{flex:none;width:38px;height:38px;padding:0;justify-content:center;line-height:1}
  /* 載入地圖是主要入口，給強調色邊框凸顯 */
  #btnDl{border:1.6px solid #2563eb}
  .icon-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}

  /* ---- 引導條 ---- */
  .guide{position:absolute;left:12px;right:12px;bottom:150px;z-index:500;
    background:var(--glass);backdrop-filter:blur(8px);
    border:1px solid var(--border);border-left:3px solid #2563eb;border-radius:10px;
    padding:11px 13px;display:flex;gap:10px;align-items:center;
    transition:opacity .25s,transform .25s}
  .guide.hide{opacity:0;transform:translateY(6px);pointer-events:none}
  .guide .n{width:21px;height:21px;flex:none;border-radius:50%;background:#2563eb;
    color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center}
  .guide p{margin:0;font-size:13px;line-height:1.45;color:var(--text2)}
  .guide b{color:var(--text);font-weight:500}

  /* ---- 底部工具列 ---- */
  .dock{position:absolute;left:12px;right:12px;bottom:12px;z-index:500;
    background:var(--glass);backdrop-filter:blur(12px);
    border:1px solid var(--border);border-radius:16px;padding:8px;
    display:flex;flex-direction:column;gap:8px}
  .modes{display:flex;gap:6px}
  .m{flex:1;background:transparent;border:0;border-radius:11px;padding:9px 4px;
    color:var(--dim);font-size:11px;font-family:inherit;
    display:flex;flex-direction:column;align-items:center;gap:4px}
  .m svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}
  .m.on{background:#2563eb;color:#fff}
  .m:disabled{opacity:.32}
  .row2{display:flex;gap:6px}
  .sm{background:var(--panel2);border:1px solid var(--border);border-radius:11px;
    color:var(--text2);font-size:12.5px;font-family:inherit;padding:10px 12px;
    display:flex;align-items:center;gap:5px}
  .sm svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}
  .sm:disabled{opacity:.32}
  .go{flex:1;justify-content:center;background:#16a34a;border-color:#16a34a;
    color:#fff;font-weight:500;font-size:14px}
  .go:disabled{background:var(--panel2);border-color:var(--border);color:var(--dim)}
  /* 微調路徑工具列 */
  .dock[hidden]{display:none}
  #editDock .sm{flex:1;justify-content:center}
  .sm.on{background:#2563eb;border-color:#2563eb;color:#fff}
  .sm.danger{background:#dc2626;border-color:#dc2626;color:#fff;font-weight:500}
  .sm.danger:disabled{background:var(--panel2);border-color:var(--border);color:var(--dim)}

  /* ---- 距離膠囊 ---- */
  .pill{position:absolute;top:58px;left:50%;transform:translateX(-50%);z-index:500;
    background:var(--glass);backdrop-filter:blur(8px);border:1px solid var(--border);
    border-radius:999px;padding:6px 15px;font-size:13px;font-weight:500;
    transition:opacity .2s}
  .pill.hide{opacity:0;pointer-events:none}
  .pill.tap{background:#2563eb;border-color:#2563eb;color:#fff;cursor:pointer}

  /* ---- 結果面板 ---- */
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:600;
    background:var(--panel);border-top:1px solid var(--border);
    border-radius:18px 18px 0 0;padding:8px 16px 18px;
    transform:translateY(102%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
  .sheet.up{transform:translateY(0)}
  .grip{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
  .stat{background:var(--panel2);border-radius:11px;padding:10px 11px}
  .stat span{display:block;font-size:11.5px;color:var(--dim);margin-bottom:3px}
  .stat b{font-size:19px;font-weight:500}
  .prev{background:var(--panel2);border-radius:11px;padding:9px 11px;margin-bottom:10px}
  .prow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .prow .lbl{font-size:12.5px;color:var(--dim)}
  .prow b{font-size:15px;font-weight:500;margin-left:auto}
  .prow .unit{font-size:11.5px;color:var(--dim);min-width:34px;text-align:right}
  .prow button{width:30px;height:30px;flex:none;border-radius:8px;border:1px solid var(--border);
    background:var(--panel3);color:var(--text);font-size:13px;font-family:inherit;line-height:1}
  /* 拉桿：左側＝走過（橘 #f59e0b，和小人走過的橘線同色）、右側＝未走過（藍，路線原色）。
     漸層分界由 JS 隨拉桿位置更新（見 pvSet）。 */
  #pvSlider{width:100%;margin:8px 0;-webkit-appearance:none;appearance:none;height:6px;
    border-radius:3px;background:linear-gradient(to right,#f59e0b 0%,#38bdf8 0%);outline:none}
  #pvSlider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;
    border-radius:50%;background:#f59e0b;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);
    cursor:pointer;margin-top:-6px}
  #pvSlider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#f59e0b;
    border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);cursor:pointer}
  .pace{display:flex;align-items:center;gap:8px;background:var(--panel2);border-radius:11px;
    padding:8px 11px;margin-bottom:10px}
  .pace .lbl{font-size:12.5px;color:var(--dim)}
  .pace button{width:30px;height:30px;flex:none;border-radius:8px;border:1px solid var(--border);
    background:var(--panel3);color:var(--text);font-size:17px;font-family:inherit;line-height:1}
  .pace b{font-size:16px;font-weight:500;min-width:44px;text-align:center}
  .pace .unit{font-size:11.5px;color:var(--dim)}
  .pace .hint{margin-left:auto;font-size:11.5px;color:var(--dim)}
  /* 次要動作：一排四顆，圖示在上文字在下 */
  .tools{display:flex;gap:6px;margin-bottom:9px}
  .tools button{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:11px;
    color:var(--text2);font-size:11px;font-family:inherit;padding:9px 2px;
    display:flex;flex-direction:column;align-items:center;gap:5px}
  .tools svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}
  .tools button:disabled{opacity:.32}

  /* 匯出圖片的選項對話框 */
  .modal{position:absolute;inset:0;z-index:900;background:var(--scrim);
    display:flex;align-items:center;justify-content:center;padding:20px}
  .modal[hidden]{display:none}
  .mbox{width:100%;max-width:340px;background:var(--panel);border:1px solid var(--border);
    border-radius:16px;padding:16px}
  .mtitle{font-size:15px;font-weight:500;margin-bottom:12px}
  .sw{display:flex;align-items:center;gap:10px;background:var(--panel2);border-radius:11px;
    padding:11px 12px;margin-bottom:8px}
  .sw input{width:19px;height:19px;flex:none;accent-color:#2563eb;margin:0}
  .sw span{font-size:13.5px;display:flex;flex-direction:column;gap:2px}
  .sw i{font-style:normal;font-size:11.5px;color:var(--dim)}
  .rlabel{font-size:11.5px;color:var(--dim);margin:2px 2px 6px}
  .ratios{display:flex;gap:6px;margin-bottom:12px}
  .rt{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:11px;
    color:var(--text2);font-size:14px;font-weight:500;font-family:inherit;padding:9px 2px;
    display:flex;flex-direction:column;align-items:center;gap:3px}
  .rt i{font-style:normal;font-size:10.5px;color:var(--dim);font-weight:400}
  .rt.on{background:#2563eb;border-color:#2563eb;color:#fff}
  .rt.on i{color:rgba(255,255,255,.82)}
  /* 匯出即時預覽小框 + 進度拉桿 */
  .mprev{display:block;width:100%;background:var(--panel3);border:1px solid var(--border);
    border-radius:11px;margin-bottom:12px}
  .mprog{width:100%;margin:2px 0 12px;-webkit-appearance:none;appearance:none;height:6px;
    border-radius:3px;background:linear-gradient(to right,#f59e0b 0%,#38bdf8 0%);outline:none}
  .mprog::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;
    border-radius:50%;background:#f59e0b;border:2px solid #fff;cursor:pointer;margin-top:-5px}
  .mprog::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#f59e0b;
    border:2px solid #fff;cursor:pointer}
  .mact{display:flex;gap:8px;margin-top:14px}
  .mact button{flex:1;padding:11px;border-radius:11px;font-size:13.5px;font-family:inherit;
    font-weight:500;border:1px solid var(--border);background:var(--panel2);color:var(--text)}
  .mact .pri{background:#2563eb;border-color:#2563eb;color:#fff}

  .acts{display:flex;gap:8px}
  .acts button{flex:1;padding:12px;border-radius:11px;font-size:13.5px;
    font-family:inherit;font-weight:500;border:1px solid var(--border);
    background:var(--panel2);color:var(--text);display:flex;align-items:center;
    justify-content:center;gap:6px}
  .acts .pri{background:#2563eb;border-color:#2563eb;color:#fff}
  .acts svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}

  .toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:900;
    background:var(--glass);border:1px solid var(--border);border-radius:12px;color:var(--text);
    padding:15px 20px;font-size:13.5px;text-align:center;opacity:0;
    transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .busy{position:absolute;top:0;left:0;right:0;z-index:800;display:none;
    align-items:center;gap:9px;justify-content:center;padding:10px;color:var(--text);
    background:var(--glass);border-bottom:1px solid var(--border);font-size:13px}
  .busy.on{display:flex}
  .spin{width:14px;height:14px;border:2px solid #2563eb;border-top-color:transparent;
    border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .box{position:absolute;border:2px dashed #2563eb;background:rgba(37,99,235,.14);
    z-index:450;pointer-events:none;border-radius:4px}

  /* ==== 桌面版：操作按鈕移到左側直排，結果改成右下角浮空卡片 ==== */
  @media (min-width:900px){
    .dock{left:14px;top:72px;right:auto;bottom:auto;width:200px}
    .dock .modes,.dock .row2{flex-direction:column}
    #mainDock .m{flex-direction:row;justify-content:flex-start;gap:11px;
      padding:11px 13px;font-size:13px}
    #mainDock .m svg{width:19px;height:19px}
    #mainDock .sm{justify-content:flex-start}
    .sheet{left:auto;right:20px;bottom:20px;width:410px;
      border:1px solid var(--border);border-radius:16px;
      max-height:calc(100vh - 40px);overflow:auto}
    .grip{display:none}
    .guide{left:230px;right:auto;max-width:460px;bottom:26px}
    .pill{left:auto;right:20px;transform:none}
    .pill.tap{transform:none}
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="top">
  <div class="brand">Running Art</div>
  <button class="btn-dl icon-btn push" id="btnLang" aria-label="Language">EN</button>
  <button class="btn-dl icon-btn" id="btnTheme" aria-label="切換深淺色主題">
    <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.2M12 19.3v2.2M4.2 12H2M22 12h-2.2M5.4 5.4l1.6 1.6M17 17l1.6 1.6M18.6 5.4L17 7M7 17l-1.6 1.6"/></svg>
  </button>
  <button class="btn-dl" id="btnDl">
    <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
    <span id="dlLabel">載入地圖範圍</span>
  </button>
</div>

<div class="pill hide" id="pill">0.00 km</div>

<div class="guide" id="guide">
  <div class="n" id="gn">1</div>
  <p id="gt"></p>
</div>

<div class="dock" id="mainDock">
  <div class="modes">
    <button class="m on" data-mode="pan" id="mPan">
      <svg viewBox="0 0 24 24"><path d="M8 13V5a1.5 1.5 0 013 0v6m0-1V4a1.5 1.5 0 013 0v6m0 0V6a1.5 1.5 0 013 0v7m0-2a1.5 1.5 0 013 0v4a7 7 0 01-7 7h-1a7 7 0 01-7-7v-1a1.5 1.5 0 013-1"/></svg>
      <span data-en="Move">移動</span>
    </button>
    <button class="m" data-mode="draw" id="mDraw" disabled>
      <svg viewBox="0 0 24 24"><path d="M4 20h4L19 9a2.8 2.8 0 00-4-4L4 16v4z"/></svg>
      <span data-en="Draw">畫圖</span>
    </button>
    <button class="m" data-mode="start" id="mStart" disabled>
      <svg viewBox="0 0 24 24"><path d="M12 21s7-5.6 7-11a7 7 0 10-14 0c0 5.4 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
      <span data-en="Start">起點</span>
    </button>
    <button class="m" data-mode="end" id="mEnd" disabled>
      <svg viewBox="0 0 24 24"><path d="M5 21V4m0 0l9 3-9 3"/><path d="M5 7h13l-3 4 3 4H5"/></svg>
      <span data-en="Finish">終點</span>
    </button>
  </div>
  <div class="row2">
    <button class="sm" id="btnUndo" disabled>
      <svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 010 10h-4"/></svg><span data-en="Undo">復原</span>
    </button>
    <button class="sm" id="btnClear" disabled>
      <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg><span data-en="Clear">清除</span>
    </button>
    <button class="sm go" id="btnGo" disabled>
      <svg viewBox="0 0 24 24"><path d="M13 4l-1.5 4.5L15 11l-4 2 1 7-6-8 3-1-2-3 6-4z"/></svg><span data-en="Generate">生成路線</span>
    </button>
  </div>
</div>

<div class="dock" id="editDock" hidden>
  <div class="row2">
    <button class="sm" id="eBox">
      <svg viewBox="0 0 24 24"><path d="M4 8V5a1 1 0 011-1h3M16 4h3a1 1 0 011 1v3M20 16v3a1 1 0 01-1 1h-3M8 20H5a1 1 0 01-1-1v-3"/></svg><span data-en="Box Select">框選</span>
    </button>
    <button class="sm" id="eNone" disabled>
      <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg><span data-en="Deselect">取消選取</span>
    </button>
    <button class="sm" id="eUndo" disabled>
      <svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 010 10h-4"/></svg><span data-en="Undo">復原</span>
    </button>
  </div>
  <div class="row2">
    <button class="sm danger" id="eDel" disabled>
      <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg><span data-en="Delete">刪除選取</span>
    </button>
    <button class="sm go" id="eDone">
      <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg><span data-en="Done">完成</span>
    </button>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="grip"></div>
  <div class="stats">
    <div class="stat"><span data-en="Distance">路線距離</span><b id="sDist">–</b></div>
    <div class="stat"><span data-en="Match">與圖形吻合</span><b id="sFit">–</b></div>
    <div class="stat"><span data-en="Est. time">預估時間</span><b id="sTime">–</b></div>
    <div class="stat"><span data-en="Elevation">爬升 / 下降</span><b id="sElev">–</b></div>
  </div>
  <div class="prev">
    <div class="prow">
      <span class="lbl" data-en="Preview">路線預覽</span>
      <b id="pvAt">0.00 km</b>
      <span class="unit" id="pvPct">0%</span>
      <button id="pvPlay" aria-label="play">▶</button>
    </div>
    <input type="range" id="pvSlider" min="0" max="1000" value="0" step="1">
  </div>
  <div class="pace">
    <span class="lbl" data-en="Pace">配速</span>
    <button id="pDn" aria-label="slower">−</button>
    <b id="pVal">6:00</b><span class="unit" id="pUnit" data-en="min/km">分/公里</span>
    <button id="pUp" aria-label="faster">+</button>
    <span class="hint" id="pHint">慢跑</span>
  </div>
  <div class="tools">
    <button id="aEdit">
      <svg viewBox="0 0 24 24"><path d="M4 20h4L19 9a2.8 2.8 0 00-4-4L4 16v4z"/></svg><span data-en="Edit Path">微調路徑</span>
    </button>
    <button id="aRev">
      <svg viewBox="0 0 24 24"><path d="M17 3l4 4-4 4"/><path d="M21 7H8a4 4 0 00-4 4v1"/><path d="M7 21l-4-4 4-4"/><path d="M3 17h13a4 4 0 004-4v-1"/></svg><span data-en="Reverse">反轉方向</span>
    </button>
    <button id="aMod">
      <svg viewBox="0 0 24 24"><path d="M11 4H5a2 2 0 00-2 2v13a2 2 0 002 2h13a2 2 0 002-2v-6"/><path d="M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z"/></svg><span data-en="Edit Shape">修改圖案</span>
    </button>
    <button id="aNew">

<!-- 帶版本參數，否則改了 engine.js 瀏覽器仍會沿用快取的舊引擎 -->

<script>
const map=L.map('map',{zoomControl:false,attributionControl:false}).setView([25.0610,121.5330],16);

/* ---------- 深／淺色主題 ---------- */
// 底圖跟著換：深色用 CARTO dark_all，淺色用 light_all。
const TILE_URL=t=>`https://{s}.basemaps.cartocdn.com/${t?'light_all':'dark_all'}/{z}/{x}/{y}{r}.png`;
let baseLayer=null, areaMask=null, areaRect=null;
function isLight(){return document.body.classList.contains('light');}
function applyBaseLayer(){
  if(baseLayer) baseLayer.remove();
  baseLayer=L.tileLayer(TILE_URL(isLight()),{maxZoom:19}).addTo(map);
  baseLayer.bringToBack();
  // 已下載範圍的遮罩顏色也要隨主題（淺色用淺灰遮罩、深色用近黑）
  if(areaMask) areaMask.setStyle({fillColor:isLight()?'#8a96a6':'#05070a'});
  // 範圍框虛線：亮色底圖用黑、深色底圖用白
  if(areaRect) areaRect.setStyle({color:isLight()?'#000':'#fff'});
}
function setTheme(light,save=true){
  document.body.classList.toggle('light',light);
  if(save) localStorage.setItem('runart_theme',light?'light':'dark');
  applyBaseLayer();
  // 小人外框跟主題（亮黑深白）重繪。try 包住：初始化時本函式會在 pvHead（let）
  // 宣告前被呼叫，落在暫時死區（TDZ）—— 連 typeof 都會拋 ReferenceError、
  // 中斷整個 script。那時還沒有小人，跳過即可。
  try{ if(pvHead) pvPose(!!S.pvActive); }catch(_){}
}
// 初始主題：記住的優先，否則跟隨系統設定
(function(){
  const saved=localStorage.getItem('runart_theme');
  const light=saved?saved==='light':window.matchMedia('(prefers-color-scheme: light)').matches;
  setTheme(light,false);
})();
document.getElementById('btnTheme').onclick=()=>setTheme(!isLight());

/* ---------- 中英文切換（i18n） ----------
   靜態文字用 HTML 的 data-en 屬性；動態字串（toast / 進度 / 引導 / 匯出）查下面的表。
   toast() 與 busy() 會自動把中文原字換成英文，所以大多數呼叫端不用改。 */
let lang = localStorage.getItem('runart_lang') || (navigator.language.toLowerCase().startsWith('zh')?'zh':'en');
const EN=()=>lang==='en';
const tx=(zh,en)=>EN()?en:zh;   // 有插值的字串用這個選字

const STEPS_I18N={
 zh:{
  1:['先框選要載入的地圖範圍','點右上角 <b>載入地圖範圍</b>，然後在地圖上拖曳一個方框'],
  2:['畫出你想要的圖案','點下方 <b>畫圖</b>，在<b>藍色框線內</b>畫。畫錯可以按復原'],
  3:['設定起點與終點','點 <b>起點</b> 後在地圖上點一下，終點同理'],
  4:['準備好了','按 <b>生成路線</b>，把圖案對齊到真實道路'],
  5:['完成','可下載 GPX 或圖片。要改圖案請按 <b>修改圖案</b>']
 },
 en:{
  1:['Choose an area to load','Tap <b>Load Map</b> (top-right), then drag a box on the map'],
  2:['Draw your shape','Tap <b>Draw</b> and draw inside the <b>blue box</b>. Undo if needed'],
  3:['Set start & finish','Tap <b>Start</b> then tap the map; same for Finish'],
  4:['Ready','Tap <b>Generate</b> to snap your shape onto real roads'],
  5:['Done','Save a GPX or image. Tap <b>Edit Shape</b> to change the drawing']
 }
};
const TOASTS_EN={
 '在地圖上拖曳一個方框':'Drag a box on the map',
 '請在藍色框線內畫圖':'Please draw inside the blue box',
 '超出已下載範圍':'Outside the loaded area',
 '起點／終點要在藍色框線內':'Start / finish must be inside the blue box',
 '起點已設定':'Start set','終點已設定':'Finish set',
 '可以繼續修改圖案，改完再按生成路線':'Edit your shape, then tap Generate again',
 '已清空，重新開始畫':'Cleared — start drawing again',
 '已反轉方向':'Direction reversed',
 '橘色大點是轉彎處。點一下節點選取，或用「框選」一次選多個':'Orange dots are turns. Tap a node to select, or use Box Select for many',
 '拖曳框住要刪除的節點':'Drag a box over the nodes to delete',
 '改回點擊選取，可拖曳地圖':'Back to tap-select; you can pan the map',
 '刪掉這些節點後找不到別條路可以繞過去，已自動復原。試著把整段繞路一起框選刪除。':'No alternative road to detour around — auto-reverted. Try box-selecting the whole detour.',
 '無法刪除：這一段剩下的點太少了。':'Cannot delete: too few nodes left in this segment.',
 '已重新沿道路接好':'Re-routed along the roads',
 '沒有可復原的步驟':'Nothing to undo',
 'GPX 已下載':'GPX downloaded','運算引擎已就緒':'Engine ready',
 '地圖下載失敗：目前公用伺服器（Overpass）都很忙碌。請縮小範圍、或等一兩分鐘再試。已下載過的範圍會被記住，可以離線重用。':'Map load failed: the public Overpass servers are all busy. Try a smaller area or wait a minute. Loaded areas are remembered and reusable offline.',
 '這個範圍抓不到可跑的道路（伺服器可能回了空資料）。請換個地點、把範圍放大一點或稍後再試。':'No runnable roads found here (the server may have returned empty data). Try another spot, enlarge the area, or retry later.'
};
const PROG_EN={
 '載入運算引擎…':'Loading engine…','載入數學套件…':'Loading math packages…',
 '載入路網套件…':'Loading graph packages…','載入演算法…':'Loading algorithm…',
 '下載路網（同時向多台伺服器請求）…':'Loading roads (querying several servers)…',
 '伺服器忙碌，重試中…':'Servers busy, retrying…','使用已下載的地圖…':'Using saved map…',
 '建立路網…':'Building road network…','對齊道路中…':'Snapping to roads…',
 '重新接路中…':'Re-routing…','產生圖片…':'Creating image…','查詢地點…':'Finding location…'
};
const PACE_NAMES={zh:['競速','慢跑','輕鬆跑','快走'],en:['Fast','Jog','Easy','Brisk']};
const EXP_LABELS={zh:['距離','配速','預估時間','爬升／下降'],en:['Distance','Pace','Est. time','Elev. ↑/↓']};

function updateDlLabel(){
  // 尚未載入地圖時顯示提示字；載入後由既有流程顯示面積，不覆寫
  if(!S.hasMap && !S.boxing) $('dlLabel').textContent = tx('載入地圖範圍','Load Map');
}
function applyLang(){
  document.querySelectorAll('[data-en]').forEach(eln=>{
    if(eln.dataset.zh==null) eln.dataset.zh=eln.textContent;
    eln.textContent = EN()?eln.dataset.en:eln.dataset.zh;
  });
  document.documentElement.lang = EN()?'en':'zh-Hant';
  $('btnLang').textContent = EN()?'中':'EN';
  localStorage.setItem('runart_lang',lang);
  guide(); paceUI(); updateDlLabel();
  if(S.result&&S.elevGain!=null) $('sElev').textContent='↑'+S.elevGain+' ↓'+S.elevLoss+' m';
}
document.getElementById('btnLang').onclick=()=>{ lang=EN()?'zh':'en'; applyLang(); };

const S={mode:'pan',hasMap:false,strokes:[],cur:null,start:null,end:null,
         boxing:false,generated:false,sheetUp:false,step:1,bounds:null,warned:0,
         editing:false,ebox:false,eDown:null,sel:new Set(),locked:false};
const $=id=>document.getElementById(id);
const el={guide:$('guide'),gn:$('gn'),gt:$('gt'),pill:$('pill'),sheet:$('sheet'),toast:$('toast')};
let routeLayer=null,startMk=null,endMk=null,boxEl=null,boxA=null;

function guide(){
  const s=STEPS_I18N[lang][S.step];
  // 結果面板升起時，引導條與距離膠囊都讓位，避免互相遮擋
  if(S.sheetUp||!s){el.guide.classList.add('hide');return;}
  el.guide.classList.remove('hide');
  el.gn.textContent=S.step;
  el.gt.innerHTML='<b>'+s[0]+'</b><br>'+s[1];
  positionGuide();
}
/* 把引導提示框放到「當前步驟要按的那顆按鈕」旁邊，操作更直覺。
   頂部按鈕→放下方；桌面左側工具列→放右邊；手機底部工具列→放上方。 */
const GUIDE_TARGET={1:'btnDl',2:'mDraw',3:'mStart',4:'btnGo'};
function positionGuide(){
  const g=el.guide;
  const btn=GUIDE_TARGET[S.step]&&$(GUIDE_TARGET[S.step]);
  // 先清掉之前的定位，交回 CSS
  g.style.position=g.style.left=g.style.right=g.style.top=g.style.bottom=g.style.width=g.style.maxWidth='';
  if(!btn) return;
  const r=btn.getBoundingClientRect();
  if(!r.width) return;
  const gw=Math.min(300, window.innerWidth-24);
  g.style.position='fixed';g.style.right='auto';g.style.bottom='auto';
  g.style.width='auto';g.style.maxWidth=gw+'px';g.style.left='0px';g.style.top='0px';
  const gh=g.offsetHeight, gwA=Math.min(g.offsetWidth,gw), M=10;
  let left,top;
  if(r.top<120){                                   // 頂部（載入地圖）→ 放下方靠右
    top=r.bottom+M; left=Math.min(r.right-gwA, window.innerWidth-gwA-12);
  }else if(window.innerWidth>=900 && r.left<window.innerWidth/2){  // 桌面左側→放右邊
    left=r.right+M; top=Math.min(Math.max(12,r.top+r.height/2-gh/2), window.innerHeight-gh-12);
  }else{                                            // 手機底部→放上方
    top=r.top-gh-M; left=Math.min(Math.max(12,r.left+r.width/2-gwA/2), window.innerWidth-gwA-12);
  }
  g.style.left=Math.max(12,left)+'px'; g.style.top=Math.max(12,top)+'px';
}
window.addEventListener('resize',()=>{ if(!el.guide.classList.contains('hide')) positionGuide(); });
function toast(t,ms=1500){
  if(EN()&&TOASTS_EN[t]) t=TOASTS_EN[t];   // 已知中文字串自動換英文
  el.toast.textContent=t;el.toast.classList.add('show');
  setTimeout(()=>el.toast.classList.remove('show'),ms);
}
// 把「已下載範圍」永久標示在底圖上：框線 + 框外變暗，
// 使用者一眼就知道自己能畫到哪裡。
function showArea(b){
  const W=[[90,-180],[90,180],[-90,180],[-90,-180]];
  const hole=[b.getNorthWest(),b.getNorthEast(),b.getSouthEast(),b.getSouthWest()];
  if(areaMask) areaMask.remove();
  if(areaRect) areaRect.remove();
  areaMask=L.polygon([W,hole],{stroke:false,fillColor:isLight()?'#8a96a6':'#05070a',
    fillOpacity:.55,interactive:false}).addTo(map);
  areaRect=L.rectangle(b,{color:isLight()?'#000':'#fff',weight:2,dashArray:'7 5',fill:false,interactive:false}).addTo(map);
  map.fitBounds(b,{padding:[26,26]});
}
function inArea(ll){return !S.bounds||S.bounds.contains(ll);}

function setMode(m){
  if(m!=='pan'&&!S.hasMap) return;
  // 生成後鎖住編輯，要先按「修改圖案」或「重新繪製」才能再動
  if(m!=='pan'&&S.locked) return;
  S.mode=m;
  document.querySelectorAll('.m').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));
  // 模式切換：只有「移動」模式能拖曳地圖
  if(m==='pan'){map.dragging.enable();}else{map.dragging.disable();}
  map.getContainer().style.cursor = m==='pan'?'grab':'crosshair';
}
document.querySelectorAll('.m').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));

/* 拖曳畫框（下載範圍與微調框選共用） */
function boxBegin(e){
  boxA=[e.clientX,e.clientY];
  boxEl=document.createElement('div');boxEl.className='box';document.body.appendChild(boxEl);
}
function boxDrag(e){
  if(!boxA||!boxEl) return;
  const x=Math.min(boxA[0],e.clientX),y=Math.min(boxA[1],e.clientY);
  boxEl.style.cssText+=`;left:${x}px;top:${y}px;width:${Math.abs(e.clientX-boxA[0])}px;height:${Math.abs(e.clientY-boxA[1])}px`;
}
/* 收框，回傳 {x0,y0,x1,y1}（相對地圖容器）；沒在畫框就回傳 null */
function boxEnd(e){
  if(!boxA) return null;
  const a=boxA;boxA=null;
  if(boxEl){boxEl.remove();boxEl=null;}
  const r=mc.getBoundingClientRect();
  return {x0:Math.min(a[0],e.clientX)-r.left, y0:Math.min(a[1],e.clientY)-r.top,
          x1:Math.max(a[0],e.clientX)-r.left, y1:Math.max(a[1],e.clientY)-r.top};
}

function refresh(){
  if(S.editing) return;   // 微調模式有自己的一套按鈕與提示
  const n=S.strokes.length;
  $('btnUndo').disabled=!n||S.locked; $('btnClear').disabled=!n||S.locked;
  $('btnGo').disabled=!(n&&S.start&&S.end)||S.locked;
  ['mDraw','mStart','mEnd'].forEach(i=>$(i).disabled=!S.hasMap||S.locked);
  if(S.locked&&S.mode!=='pan') setMode('pan');
  let d=0;
  for(const s of S.strokes) for(let i=1;i<s.pts.length;i++) d+=map.distance(s.pts[i-1],s.pts[i]);
  if(S.result&&!S.sheetUp){
    // 生成後不能再畫圖，所以膠囊要能把結果面板叫回來，否則收起來就卡住了
    el.pill.classList.remove('hide');
    el.pill.textContent=tx('▲ 路線 ','▲ Route ')+S.km.toFixed(2)+' km';
    el.pill.classList.add('tap');
  }else if(n&&!S.sheetUp){
    el.pill.classList.remove('hide');
    el.pill.textContent=(d/1000).toFixed(2)+' km';
    el.pill.classList.remove('tap');
  }else{
    el.pill.classList.add('hide');
    el.pill.classList.remove('tap');
  }
  // 引導自動推進，不需要使用者點「下一步」
  let st=1;
  if(S.hasMap) st=2;
  if(S.hasMap&&n) st=3;
  if(S.hasMap&&n&&S.start&&S.end) st=4;
  if(S.generated) st=5;
  if(st!==S.step){S.step=st;guide();}
}

/* ---------- 框選下載 ---------- */
$('btnDl').onclick=()=>{
  S.boxing=!S.boxing;
  $('btnDl').classList.toggle('on',S.boxing);
  $('dlLabel').textContent=S.boxing?tx('取消框選','Cancel'):tx('載入地圖範圍','Load Map');
  map.dragging[S.boxing?'disable':'enable']();
  if(S.boxing) toast('在地圖上拖曳一個方框',1800);
};
const mc=map.getContainer();
mc.addEventListener('pointerdown',e=>{
  if(S.editing){
    S.eDown=[e.clientX,e.clientY];
    if(S.ebox) boxBegin(e);
    return;
  }
  if(S.boxing){
    boxBegin(e);
    return;
  }
  if(S.mode==='draw'&&S.hasMap){
    const ll=map.mouseEventToLatLng(e);
    if(!inArea(ll)){toast('請在藍色框線內畫圖');return;}
    S.cur=[ll];
    S.curLine=L.polyline(S.cur,{color:'#ef4444',weight:5,opacity:.95}).addTo(map);
  }
});
mc.addEventListener('pointermove',e=>{
  if(S.editing){
    if(S.ebox) boxDrag(e);
    return;
  }
  if(S.boxing){
    boxDrag(e);
    return;
  }
  if(S.mode==='draw'&&S.cur){
    const ll=map.mouseEventToLatLng(e);
    if(!inArea(ll)){
      if(Date.now()-S.warned>1600){S.warned=Date.now();toast('超出已下載範圍');}
      return;
    }
    S.cur.push(ll);S.curLine.setLatLngs(S.cur);
  }
});
mc.addEventListener('pointerup',e=>{
  if(S.editing){
    const d=S.eDown;S.eDown=null;
    if(S.ebox){
      const r=boxEnd(e);
      if(r) editBoxSelect(r);
      return;
    }
    // 移動超過 8px 視為在拖曳地圖，不當成點選節點
    if(d&&Math.hypot(e.clientX-d[0],e.clientY-d[1])<=8) editPick(map.mouseEventToLatLng(e));
    return;
  }
  if(S.boxing&&boxA){
    const r=boxEnd(e);
    if(r&&r.x1-r.x0>30&&r.y1-r.y0>30){
      const p1=map.containerPointToLatLng([r.x0,r.y0]);
      const p2=map.containerPointToLatLng([r.x1,r.y1]);
      const bounds=L.latLngBounds(p1,p2);
      S.boxing=false;$('btnDl').classList.remove('on');
      const km=(map.distance(bounds.getNorthWest(),bounds.getNorthEast())/1000)
             *(map.distance(bounds.getNorthWest(),bounds.getSouthWest())/1000);
      $('dlLabel').textContent=tx('載入中…','Loading…');
      Engine.loadArea(bounds.getSouth(),bounds.getWest(),bounds.getNorth(),bounds.getEast())
        .then(st=>{
          S.hasMap=true;S.bounds=bounds;
          showArea(bounds);
          $('dlLabel').textContent=km.toFixed(1)+' km²';
          ['mDraw','mStart','mEnd'].forEach(i=>$(i).disabled=false);
          toast(tx('路網已載入（'+st.nodes+' 個路口）','Roads loaded ('+st.nodes+' junctions)'));setMode('draw');refresh();
        })
        .catch(err=>{busy('');updateDlLabel();toast(err.message,3000);});
    }
    return;
  }
  if(S.mode==='draw'&&S.cur){
    if(S.cur.length>3) S.strokes.push({pts:S.cur,line:S.curLine});
    else S.curLine.remove();
    S.cur=null;S.curLine=null;refresh();
  }
});
// 起終點標記：綠圈內 ▶＝起點、紅圈內 ■＝終點（比兩個不同色的圓點好辨識）。
// 地圖與匯出圖片用同一套語意（綠=start、紅=stop）。
function seIcon(isStart){
  const bg=isStart?'#16a34a':'#dc2626';
  const glyph=isStart
    ? '<path d="M9.5 7 L17 12 L9.5 17 Z" fill="#fff"/>'

      +'<circle cx="12" cy="12" r="10.4" fill="'+bg+'" stroke="#fff" stroke-width="2.4"/>'+glyph+'</svg>'});
}
map.on('click',e=>{

/* 丟掉生成結果，回到可編輯狀態（手繪線保留） */
function dropRoute(){

/* ---------- 生成（原型：假資料） ---------- */
/* ---------- 路線預覽（拉桿 + 方向） ---------- */
let pvDone=null,pvHead=null,pvArrows=null,pvTimer=null,poseT=null;
/* 預覽的「跑者」圖示：靜止＝站立、拖曳／播放中＝雙手舉高。SVG 自己畫，深淺底圖都清楚。 */
function personSVG(active){
  const arms = active
    ? '<path d="M13 12.5 L6.5 6.5"/><path d="M13 12.5 L19.5 6.5"/>'   // 雙手舉高
    : '<path d="M13 12.5 L8 18"/><path d="M13 12.5 L18 18"/>';        // 自然垂下
  // 頭縮小（r 3.8→3）。兩層疊畫：先用主題色（亮黑深白）粗描一圈外框，
  // 再畫橘色本體，這樣深淺底圖上小人邊緣都清楚。
  const body='<circle cx="13" cy="5.2" r="3"/><path d="M13 8 L13 19"/>'+arms
            +'<path d="M13 19 L9 27"/><path d="M13 19 L17 27"/>';
  const oc=isLight()?'#000':'#fff';
  return '<svg width="28" height="32" viewBox="0 0 26 30" style="filter:drop-shadow(0 0 1.5px rgba(0,0,0,.45))">'
    +'<g fill="none" stroke="'+oc+'" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round">'+body+'</g>'
    +'<g fill="#f97316" stroke="#f97316" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">'+body+'</g>'
    +'</svg>';
}
function personIcon(active){
  return L.divIcon({className:'',iconSize:[28,32],iconAnchor:[14,29],html:personSVG(active)});
}
function pvPose(active){ S.pvActive=active; if(pvHead) pvHead.setIcon(personIcon(active)); }
function pvBuild(res){
  // 把所有分段串成一條連續路徑，並累計距離
  S.path=[];
  res.segments.forEach(sg=>sg.pts.forEach(p=>{
    const last=S.path.length?S.path[S.path.length-1]:null;
    if(!last||last[0]!==p[0]||last[1]!==p[1]) S.path.push(p);
  }));
  S.cum=[0];
  for(let i=1;i<S.path.length;i++)
    S.cum.push(S.cum[i-1]+map.distance(S.path[i-1],S.path[i]));
  S.totalM=S.cum[S.cum.length-1]||0;

  [pvDone,pvHead,pvArrows].forEach(l=>{if(l)l.remove();});
  pvDone=L.polyline([],{color:'#f59e0b',weight:7,opacity:.95}).addTo(map);
  pvHead=L.marker(S.path[0],{icon:personIcon(false),interactive:false,zIndexOffset:1000}).addTo(map);
  // 沿線每隔一段放一個方向箭頭
  const arrows=[],step=Math.max(120,S.totalM/14);
  for(let d=step;d<S.totalM;d+=step){
    const i=pvIndexAt(d);
    if(i<1) continue;
    const dir=pvHeading(d);
    if(dir===null) continue;
    arrows.push(L.marker(S.path[i],{interactive:false,icon:L.divIcon({className:'',
      iconSize:[16,16],iconAnchor:[8,8],
      html:'<div style="transform:rotate('+dir+'deg);color:#fde047;font-size:17px;line-height:16px;text-align:center;text-shadow:0 0 2px #000,0 0 4px #000">&#10148;</div>'})}));
  }
  pvArrows=L.layerGroup(arrows).addTo(map);
  $('pvSlider').value=0; pvSet(0);
}
/* 路線在「累積距離 d」處的行進方向，單位是「螢幕上順時針的角度」，0 = 向右。
   ➤ 這個字元預設就指向右，所以算出來可以直接丟給 CSS rotate()。

   兩個地方容易寫錯，都踩過：
   1. 不能拿經緯度差去算 —— Mercator 橫向會被 1/cos(緯度) 拉伸，角度會歪。
      要先 project 成平面座標（用固定 zoom，角度不隨縮放改變）。
   2. atan2(dy,dx) 已經是螢幕角度（y 軸向下所以順時針為正），直接用即可；
      寫成 90-角度 會得到沿正確方向的鏡像，看起來就是「箭頭沒有貼著路線」。 */
const PV_PROJ_Z=18;
function pvHeading(d){
  if(!S.path||S.path.length<2) return null;
  // 取前後各 20m 而不是相鄰兩點，短邊不會讓箭頭亂抖
  const a=S.path[pvIndexAt(Math.max(0,d-20))];
  const b=S.path[Math.min(pvIndexAt(Math.min(S.totalM,d+20)),S.path.length-1)];
  if(!a||!b||(a[0]===b[0]&&a[1]===b[1])) return null;
  const pa=map.project(a,PV_PROJ_Z),pb=map.project(b,PV_PROJ_Z);
  return Math.atan2(pb.y-pa.y,pb.x-pa.x)*180/Math.PI;
}
function pvIndexAt(dist){
  let lo=0,hi=S.cum.length-1;
  while(lo<hi){const mid=(lo+hi)>>1; if(S.cum[mid]<dist) lo=mid+1; else hi=mid;}
  return lo;
}
function pvSet(frac){
  if(!S.path||!S.path.length) return;
  const target=S.totalM*frac;
  const i=pvIndexAt(target);
  const shown=S.path.slice(0,Math.max(i+1,1));
  // 在最後一段上做內插，讓拉桿移動是連續的
  let head=S.path[Math.max(i,0)];
  if(i>0){
    const seg=S.cum[i]-S.cum[i-1];
    const t=seg>0?(target-S.cum[i-1])/seg:0;
    const a=S.path[i-1],b=S.path[i];
    head=[a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
    shown[shown.length-1]=head;
  }
  pvDone.setLatLngs(shown);
  pvHead.setLatLng(head);
  $('pvAt').textContent=(target/1000).toFixed(2)+' km';
  $('pvPct').textContent=Math.round(frac*100)+'%';
  // 拉桿左側染成「走過」的橘、右側「未走過」的藍，分界跟著小人位置
  const pct=(frac*100).toFixed(1);
  $('pvSlider').style.background=
    `linear-gradient(to right,#f59e0b 0%,#f59e0b ${pct}%,#38bdf8 ${pct}%,#38bdf8 100%)`;
}
$('pvSlider').oninput=e=>{
  pvStop();pvSet(+e.target.value/1000);
  // 拖曳中＝雙手舉高，放開一下子後回到站立
  pvPose(true); clearTimeout(poseT); poseT=setTimeout(()=>pvPose(false),320);
};
function pvStop(){if(pvTimer){clearInterval(pvTimer);pvTimer=null;$('pvPlay').textContent='▶';} pvPose(false);}
$('pvPlay').onclick=()=>{
  if(pvTimer){pvStop();return;}
  if(+$('pvSlider').value>=1000) $('pvSlider').value=0;
  $('pvPlay').textContent='⏸';
  pvPose(true);   // 播放中＝奔跑（雙手舉高）
  pvTimer=setInterval(()=>{
    let v=+$('pvSlider').value+8;
    if(v>=1000){v=1000;pvStop();}
    $('pvSlider').value=v;pvSet(v/1000);
  },40);
};

/* ---------- 配速（可調，會記住） ---------- */
S.pace=parseFloat(localStorage.getItem('runart_pace'))||6;   // 分鐘/公里
S.km=0;
function paceName(p){
  const i = p<=4.5?0 : p<=6.5?1 : p<=9?2 : 3;
  return PACE_NAMES[lang][i];
}
function paceUI(){
  const m=Math.floor(S.pace), sec=Math.round((S.pace-m)*60);
  $('pVal').textContent=m+':'+String(sec).padStart(2,'0');
  $('pHint').textContent=paceName(S.pace);

  if(S.km){

    else{

      txt = mm ? h+tx(' 小時 ',' h ')+mm+tx(' 分',' min') : h+tx(' 小時',' h');
    }

$('pDn').onclick=()=>{S.pace=Math.min(15,+(S.pace+0.5).toFixed(1));paceUI();};
$('pUp').onclick=()=>{S.pace=Math.max(3,+(S.pace-0.5).toFixed(1));paceUI();};

/* ---------- 生成（真實運算） ---------- */
/* 套用一份運算結果（生成與微調共用）。微調時不重建預覽，
   否則預覽圖層會蓋住要點選的節點。 */
function applyResult(res,withPreview=true){
  S.result=res;
  if(routeLayer) routeLayer.remove();
  const layers=[];
  res.segments.forEach(sg=>{
    if(sg.kind==='draw'){
      layers.push(L.polyline(sg.pts,{color:'#38bdf8',weight:6,opacity:.95}));
    }else{
      // 連接段（起點→路線、路線→終點、筆畫之間）：橘色虛線 + 深色描邊墊底，
      // 這樣在深色和淺色底圖上都看得清楚（之前灰色在提亮的底圖上會糊掉）。
      layers.push(L.polyline(sg.pts,{color:'rgba(0,0,0,.55)',weight:7,opacity:.9}));
      layers.push(L.polyline(sg.pts,{color:'#f59e0b',weight:4,opacity:1,dashArray:'9 7'}));
    }
  });
  routeLayer=L.layerGroup(layers).addTo(map);
  S.km=res.total_m/1000;
  $('sDist').textContent=S.km.toFixed(2)+' km';
  $('sFit').textContent=Math.round(res.fit)+'%';
  paceUI();
  if(withPreview) pvBuild(res);
}
function pvClear(){
  pvStop();
  [pvDone,pvHead,pvArrows].forEach(l=>{if(l)l.remove();});
  pvDone=pvHead=pvArrows=null;
}
/* ---------- 預估爬升／下降 ----------
   用 Open-Meteo 免費高程 API（有 CORS，一次最多 100 點）查整條路線的高度，
   加總正的落差＝爬升、負的＝下降。DEM 解析度較粗，城市路線通常起伏不大屬正常。 */
let elevSeq=0;
async function updateElevation(){
  if(!S.result){return;}
  const path=[];
  S.result.segments.forEach(sg=>sg.pts.forEach(p=>{
    const last=path.length?path[path.length-1]:null;
    if(!last||last[0]!==p[0]||last[1]!==p[1]) path.push(p);
  }));
  if(path.length<2){$('sElev').textContent='–';return;}
  // 等距抽樣到最多 100 點
  const N=Math.min(100,path.length);
  const samp=[];
  for(let i=0;i<N;i++) samp.push(path[Math.round(i*(path.length-1)/(N-1))]);
  const seq=++elevSeq;
  $('sElev').textContent=tx('計算中…','Calculating…');
  try{
    const lat=samp.map(p=>p[0].toFixed(5)).join(',');
    const lon=samp.map(p=>p[1].toFixed(5)).join(',');
    const ctrl=new AbortController();const tm=setTimeout(()=>ctrl.abort(),8000);
    const r=await fetch('https://api.open-meteo.com/v1/elevation?latitude='+lat+'&longitude='+lon,{signal:ctrl.signal});
    clearTimeout(tm);
    const e=(await r.json()).elevation;
    if(seq!==elevSeq) return;   // 期間又生成／編輯了，這次結果作廢
    if(!e||!e.length) throw 0;
    let up=0,down=0;
    for(let i=1;i<e.length;i++){const d=e[i]-e[i-1]; if(d>0)up+=d; else down-=d;}
    S.elevGain=Math.round(up); S.elevLoss=Math.round(down);
    $('sElev').textContent='↑'+S.elevGain+' ↓'+S.elevLoss+' m';
  }catch(_){
    if(seq===elevSeq){ S.elevGain=null;S.elevLoss=null; $('sElev').textContent='–'; }
  }
}
/* 把視野拉到路線上，並讓開結果面板與頂端按鈕 */
function fitRoute(){
  if(!S.result) return;
  const all=[];
  S.result.segments.forEach(sg=>sg.pts.forEach(p=>all.push(p)));
  if(all.length<2) return;
  const sh=S.sheetUp?el.sheet.offsetHeight:0;
  map.fitBounds(L.latLngBounds(all),
    {paddingTopLeft:[24,64],paddingBottomRight:[24,sh+20]});
}
$('btnGo').onclick=()=>{
  const strokes=S.strokes.map(s=>s.pts.map(p=>[p.lat,p.lng]));
  Engine.generate(strokes,[S.start.lat,S.start.lng],[S.end.lat,S.end.lng])
    .then(res=>{
      applyResult(res);
      S.strokes.forEach(s=>s.line.setStyle({opacity:.25,weight:3}));
      S.generated=true;S.locked=true;
      S.sheetUp=true;el.sheet.classList.add('up');
      refresh();fitRoute();updateElevation();
    })
    .catch(err=>{busy('');toast(tx('生成失敗：','Generate failed: ')+err.message,3000);});
};

/* ---------- 生成後的動作 ---------- */
$('aMod').onclick=()=>{
  dropRoute();
  S.strokes.forEach(s=>s.line.setStyle({opacity:.95,weight:5}));
  setMode('draw');refresh();
  toast('可以繼續修改圖案，改完再按生成路線',2600);
};
$('aNew').onclick=()=>{

};
$('aRev').onclick=()=>{
  if(!S.result) return;
  Engine.reverseRoute()
    .then(res=>{
      applyResult(res);
      // 起終點對調：路線現在從原本的終點跑起
      const s=S.start;S.start=S.end;S.end=s;
      if(startMk&&S.start) startMk.setLatLng(S.start);
      if(endMk&&S.end) endMk.setLatLng(S.end);
      // 方向反轉＝爬升與下降互換，不必再打一次 API
      const g=S.elevGain;S.elevGain=S.elevLoss;S.elevLoss=g;

/* ---------- 微調路徑 ---------- */
/* 節點畫在 canvas 上（幾百個 SVG 圓在手機上會很鈍），
   點選則自己算最近節點，不靠 marker 的點擊事件 —— 手指才好按。 */
const nodeRenderer=L.canvas({padding:.3});
const NODE_R=4, NODE_SEL_R=9, NODE_TURN_R=7.5, PICK_TOL_PX=24;
const TURN_DEG=28;   // 轉多少度才算「轉彎點」
let nodeLayer=null, nodeMks=[];

/* 找出一串節點裡哪些是「轉彎點」：用投影後的平面角度，避免 Mercator 拉伸。
   回傳與 latlngs 等長的布林陣列。 */
function turnFlags(latlngs){
  const f=new Array(latlngs.length).fill(false);
  const pr=ll=>map.project(ll,18);
  for(let i=1;i<latlngs.length-1;i++){
    const a=latlngs[i-1],b=latlngs[i],c=latlngs[i+1];
    if(!a||!b||!c) continue;
    const pa=pr(a),pb=pr(b),pc=pr(c);
    let d=Math.abs(Math.atan2(pc.y-pb.y,pc.x-pb.x)-Math.atan2(pb.y-pa.y,pb.x-pa.x))*180/Math.PI;
    if(d>180) d=360-d;
    if(d>=TURN_DEG) f[i]=true;
  }
  return f;
}
// 一個節點沒被選取時該有的樣式（轉彎點醒目、其餘小而淡）
function nodeStyle(turn){
  return turn
    ? {radius:NODE_TURN_R,color:'#fff',weight:2,fillColor:'#fb923c',fillOpacity:1}
    : {radius:NODE_R,color:'#facc15',weight:1,fillColor:'#facc15',fillOpacity:.5};
}
function editBuild(){
  if(nodeLayer) nodeLayer.remove();
  nodeMks=[];S.sel.clear();
  const marks=[];
  for(const sg of S.result.segments){
    const flags=turnFlags(sg.nodes||[]);   // 依你選的：只把轉彎點標出來
    (sg.nodes||[]).forEach((ll,n)=>{
      if(!ll) return;   // null 佔位：這個節點不在路網裡，不能編輯
      const turn=!!flags[n];
      const mk=L.circleMarker(ll,{renderer:nodeRenderer,interactive:false,...nodeStyle(turn)});
      nodeMks.push({si:sg.si,n,ll,mk,turn});
      marks.push(mk);
    });
  }
  nodeLayer=L.layerGroup(marks).addTo(map);
  editUI();
}
function editMark(i,on){
  const d=nodeMks[i];
  if(on) d.mk.setStyle({radius:NODE_SEL_R,color:'#ef4444',weight:1,fillColor:'#ef4444',fillOpacity:1});
  else d.mk.setStyle(nodeStyle(d.turn));
}
function editUI(){
  const n=S.sel.size;
  $('eDel').disabled=!n;$('eNone').disabled=!n;
  $('eUndo').disabled=!(S.result&&S.result.undo);
  el.pill.classList.remove('hide');
  el.pill.textContent=n?tx('已選 '+n+' 個節點',n+' selected'):tx(nodeMks.length+' 個可調整的節點',nodeMks.length+' editable nodes');
}
function editPick(ll){
  const p0=map.latLngToContainerPoint(ll);
  let best=-1,bd=1e9;
  nodeMks.forEach((d,i)=>{
    const p=map.latLngToContainerPoint(d.ll);
    const dist=Math.hypot(p.x-p0.x,p.y-p0.y);
    if(dist<bd){bd=dist;best=i;}
  });
  if(best<0||bd>PICK_TOL_PX) return;
  if(S.sel.has(best)) S.sel.delete(best); else S.sel.add(best);
  editMark(best,S.sel.has(best));editUI();
}
function editBoxSelect(r){
  if(r.x1-r.x0<6&&r.y1-r.y0<6) return;
  nodeMks.forEach((d,i)=>{
    if(S.sel.has(i)) return;
    const p=map.latLngToContainerPoint(d.ll);
    if(p.x>=r.x0&&p.x<=r.x1&&p.y>=r.y0&&p.y<=r.y1){S.sel.add(i);editMark(i,true);}
  });
  editUI();
}
$('aEdit').onclick=()=>{
  if(!S.result) return;
  S.editing=true;S.ebox=false;$('eBox').classList.remove('on');
  S.sheetUp=false;el.sheet.classList.remove('up');
  pvClear();
  $('mainDock').hidden=true;$('editDock').hidden=false;
  setMode('pan');map.dragging.enable();
  editBuild();
  toast('橘色大點是轉彎處。點一下節點選取，或用「框選」一次選多個',2800);
};
$('eBox').onclick=()=>{

  $('eBox').classList.toggle('on',S.ebox);

$('eNone').onclick=()=>{
  S.sel.forEach(i=>editMark(i,false));S.sel.clear();editUI();
};
$('eDel').onclick=()=>{
  if(!S.sel.size) return;
  const picks=[...S.sel].map(i=>({si:nodeMks[i].si,n:nodeMks[i].n}));
  Engine.editDelete(picks)
    .then(res=>{
      if(!res.ok){
        toast(res.reason==='break'
          ? '刪掉這些節點後找不到別條路可以繞過去，已自動復原。試著把整段繞路一起框選刪除。'
          : '無法刪除：這一段剩下的點太少了。',3400);
        return;
      }
      applyResult(res,false);editBuild();
      toast('已重新沿道路接好',1400);
    })
    .catch(err=>{busy('');toast(tx('刪除失敗：','Delete failed: ')+err.message,3000);});
};

/* ---------- 匯出圖片 ----------
   把底圖 tile 自己抓下來畫進 canvas（CARTO 有回 Access-Control-Allow-Origin: *，
   所以 canvas 不會被污染，可以 toBlob 下載）。不依賴任何額外函式庫。 */
const TILE_HOSTS=['a','b','c','d'];
const TILE_SIZE=256;          // 一個 tile 代表的「世界像素」
const INFO_H=250;             // 底部資訊欄高度（寬固定 1080）
// 社群媒體常見比例。寬一律 1080，資訊欄固定在最底部，地圖區 = 寬 × (高−資訊欄)。
const PNG_RATIOS={'1:1':[1080,1080],'4:5':[1080,1350],'9:16':[1080,1920]};

/* 反向地理編碼：把座標變成「中山區, 台北市」。用 OSM 的 Nominatim（有 CORS）。
   結果快取在記憶體，失敗就回空字串、不影響出圖。 */
const _placeCache={};
async function getPlaceName(lat,lon){
  const key=lang+':'+lat.toFixed(3)+','+lon.toFixed(3);   // 語言不同要分開快取
  if(key in _placeCache) return _placeCache[key];
  try{
    const ctrl=new AbortController();const tm=setTimeout(()=>ctrl.abort(),7000);
    const u='https://nominatim.openstreetmap.org/reverse?format=jsonv2&zoom=14'+
            '&accept-language='+(EN()?'en':'zh-TW')+'&lat='+lat+'&lon='+lon;
    const r=await fetch(u,{signal:ctrl.signal});clearTimeout(tm);
    if(!r.ok) throw 0;
    const a=(await r.json()).address||{};
    const district=a.city_district||a.suburb||a.borough||a.district||a.town||a.city_block||a.quarter||a.village||a.neighbourhood||'';
    const city=a.city||a.county||a.state||a.province||'';
    const parts=[];
    if(district) parts.push(district);
    if(city&&city!==district) parts.push(city);
    // 臺→台：Nominatim 中文回「臺北市」，一般習慣寫「台北市」（英文不用替換）
    const name=EN()?parts.join(', '):parts.join(', ').replace(/臺/g,'台');
    _placeCache[key]=name;
    return name;
  }catch(_){ _placeCache[key]=''; return ''; }
}

/* 本地日期。toISOString() 是 UTC，台灣 +8 在半夜會退成前一天，
   檔名和圖上日期都會顯示昨天。 */
function localDate(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')
         +'-'+String(d.getDate()).padStart(2,'0');
}
function lonToWorld(lon,z){return (lon+180)/360*TILE_SIZE*Math.pow(2,z);}
function latToWorld(lat,z){
  const r=lat*Math.PI/180;
  return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*TILE_SIZE*Math.pow(2,z);
}
function loadTile(z,x,y,i,style){
  return new Promise(res=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>res(img);
    img.onerror=()=>res(null);   // 單一 tile 失敗就留底色，不要整張圖失敗
    img.src=`https://${TILE_HOSTS[i%TILE_HOSTS.length]}.basemaps.cartocdn.com/${style}/${z}/${x}/${y}@2x.png`;
  });
}
// 匯出圖片的地圖大頭針（畫在資訊欄地點名稱左邊）
function drawPin(ctx,cx,tipY,h,color){
  const r=h*0.34, cy=tipY-h+r;
  ctx.save();
  ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx-r*0.72,cy+r*0.52);ctx.lineTo(cx+r*0.72,cy+r*0.52);ctx.lineTo(cx,tipY);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx,cy,r*0.42,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// 匯出圖上的小人（canvas 版，對應地圖上的 personSVG）：橘色本體＋主題色外框，
// footY 是腳底、對準路線上的當前位置。
function drawRunnerCanvas(ctx,x,footY,u,light){
  const oc=light?'#000':'#fff';
  const headY=footY-24*u, hipY=footY-12*u, hr=3.4*u;
  const limbs=()=>{ctx.beginPath();
    ctx.moveTo(x,headY+hr);ctx.lineTo(x,hipY);              // 身體
    ctx.moveTo(x,hipY-5*u);ctx.lineTo(x-5*u,hipY+u);        // 左手
    ctx.moveTo(x,hipY-5*u);ctx.lineTo(x+5*u,hipY+u);        // 右手
    ctx.moveTo(x,hipY);ctx.lineTo(x-4*u,footY);             // 左腿
    ctx.moveTo(x,hipY);ctx.lineTo(x+4*u,footY);ctx.stroke();// 右腿
  };
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';ctx.setLineDash([]);
  ctx.strokeStyle=oc;ctx.lineWidth=5.6*u;limbs();
  ctx.beginPath();ctx.arc(x,headY,hr+1.2*u,0,Math.PI*2);ctx.fillStyle=oc;ctx.fill();  // 頭外框
  ctx.strokeStyle='#f97316';ctx.lineWidth=3*u;limbs();
  ctx.beginPath();ctx.arc(x,headY,hr,0,Math.PI*2);ctx.fillStyle='#f97316';ctx.fill(); // 橘頭
  ctx.restore();
}

async function exportPNG(opt){
  busy('產生圖片…');
  try{
    const [W,H]=PNG_RATIOS[opt.ratio]||PNG_RATIOS['1:1'];
    const sc=W/1080;                   // 寬固定 1080，sc=1；保留以便日後改寬
    const infoH=INFO_H;
    const mapW=W, mapH=H-infoH;        // 地圖區；資訊欄固定在最底部

    // 圖片跟著 App 的深／淺色主題走
    const light=isLight();
    const TH=light?{
      tile:'light_all', tileFilter:'none', mapBg:'#e8ecf1',
      infoBg:'#ffffff', infoLine:'#dfe4ea', textMain:'#1a1d22', textDim:'#6b727d',
      overlay:'#1a1d22', overlayStroke:'rgba(255,255,255,.85)'
    }:{
      tile:'dark_all', tileFilter:'brightness(1.5) contrast(1.04)', mapBg:'#0d0f12',
      infoBg:'#14171c', infoLine:'#2b313b', textMain:'#f4f6f8', textDim:'#8b929c',
      overlay:'#fff', overlayStroke:'rgba(0,0,0,.75)'
    };

    // 1) 要涵蓋的地理範圍
    const pts=[];
    if(opt.route) S.result.segments.forEach(sg=>sg.pts.forEach(p=>pts.push(p)));
    if(opt.draw)  S.strokes.forEach(s=>s.pts.forEach(p=>pts.push([p.lat,p.lng])));
    if(!pts.length) S.result.segments.forEach(sg=>sg.pts.forEach(p=>pts.push(p)));
    if(opt.marks){
      if(S.start) pts.push([S.start.lat,S.start.lng]);
      if(S.end)   pts.push([S.end.lat,S.end.lng]);
    }
    const lats=pts.map(p=>p[0]), lons=pts.map(p=>p[1]);

    // 2) 在「世界像素(z0)」裡算，避免經緯度在 Mercator 上被拉伸
    const wx0=lonToWorld(Math.min(...lons),0), wx1=lonToWorld(Math.max(...lons),0);
    const wy0=latToWorld(Math.max(...lats),0), wy1=latToWorld(Math.min(...lats),0);
    const cx=(wx0+wx1)/2, cy=(wy0+wy1)/2;
    const dx=Math.max(wx1-wx0,1e-9)*1.16, dy=Math.max(wy1-wy0,1e-9)*1.16;  // 8% 邊界

    // 3) 把路線「置中」塞進地圖區：保留路線真實比例，四周由底圖填滿。
    //    比例是固定的（1:1／4:5／9:16），所以路線不會被壓扁，只是留白多寡不同。
    const s=Math.min(mapW/dx, mapH/dy)*0.9;    // canvas px / z0世界px；0.9 留邊
    const z=Math.max(1,Math.min(19,Math.floor(Math.log2(s))));
    const K=s/Math.pow(2,z);                    // 落在 [1,2)，@2x tile 縮小繪製最清晰
    const cxZ=cx*Math.pow(2,z), cyZ=cy*Math.pow(2,z);
    const X=lon=>mapW/2+(lonToWorld(lon,z)-cxZ)*K;
    const Y=lat=>mapH/2+(latToWorld(lat,z)-cyZ)*K;

    const cv=document.createElement('canvas');
    cv.width=W;cv.height=H;
    const ctx=cv.getContext('2d');
    ctx.fillStyle=TH.mapBg;ctx.fillRect(0,0,W,H);

    // 4) 底圖（提亮，讓道路看得清楚，與 App 內一致）
    ctx.save();ctx.beginPath();ctx.rect(0,0,mapW,mapH);ctx.clip();
    const tx0=Math.floor((cxZ-(mapW/2)/K)/TILE_SIZE), tx1=Math.floor((cxZ+(mapW/2)/K)/TILE_SIZE);
    const ty0=Math.floor((cyZ-(mapH/2)/K)/TILE_SIZE), ty1=Math.floor((cyZ+(mapH/2)/K)/TILE_SIZE);
    const jobs=[];let ji=0;
    for(let tx=tx0;tx<=tx1;tx++) for(let ty=ty0;ty<=ty1;ty++) jobs.push({tx,ty,i:ji++});
    const imgs=await Promise.all(jobs.map(j=>loadTile(z,j.tx,j.ty,j.i,TH.tile)));
    const ts=TILE_SIZE*K;
    ctx.filter=TH.tileFilter;
    jobs.forEach((j,n)=>{
      if(!imgs[n]) return;
      ctx.drawImage(imgs[n], mapW/2+(j.tx*TILE_SIZE-cxZ)*K, mapH/2+(j.ty*TILE_SIZE-cyZ)*K, ts+1, ts+1);
    });
    ctx.filter='none';

    // 5) 手繪紅線。路線通常正好貼著它跑，所以紅線要畫得比路線寬、
    //    當成路線底下透出來的光暈，否則會被藍線整條蓋掉、勾了也看不見。
    ctx.lineJoin=ctx.lineCap='round';
    if(opt.draw){
      ctx.strokeStyle='#ef4444';
      ctx.lineWidth=(opt.route?15:5)*sc;
      ctx.globalAlpha=.9;   // 別用半透明會暗成醬紅色，這裡只是壓一點點
      S.strokes.forEach(st=>{
        ctx.beginPath();
        st.pts.forEach((p,k)=>{const x=X(p.lng),y=Y(p.lat);k?ctx.lineTo(x,y):ctx.moveTo(x,y);});
        ctx.stroke();
      });
      ctx.globalAlpha=1;
    }
    // 6) 路線：先畫完整路線當「未走過」底層（draw 藍實線、連接段橘虛線），
    //    再把「走過」的部分（到拉桿位置 frac）蓋成橘實線，並記住小人位置，
    //    和地圖上的預覽一模一樣（小人走到哪、橘線就到哪）。
    let runnerHead=null;
    if(opt.route){
      S.result.segments.forEach(sg=>{
        const draw=sg.kind==='draw';
        ctx.strokeStyle=draw?'#38bdf8':'#f59e0b';
        ctx.lineWidth=(draw?7:4)*sc;
        ctx.setLineDash(draw?[]:[10*sc,9*sc]);
        ctx.beginPath();
        sg.pts.forEach((p,k)=>{const x=X(p[1]),y=Y(p[0]);k?ctx.lineTo(x,y):ctx.moveTo(x,y);});
        ctx.stroke();
      });
      ctx.setLineDash([]);
      const frac=(opt.frac!=null)?opt.frac:1;
      if(S.path&&S.path.length>1&&S.totalM>0&&frac>0){
        const target=S.totalM*frac;
        let lo=0,hi=S.cum.length-1;while(lo<hi){const m=(lo+hi)>>1;S.cum[m]<target?lo=m+1:hi=m;}
        const idx=lo;
        const shown=S.path.slice(0,Math.max(idx+1,1)).map(p=>[p[0],p[1]]);
        let head=S.path[Math.max(idx,0)];
        if(idx>0){
          const seg=S.cum[idx]-S.cum[idx-1],t=seg>0?(target-S.cum[idx-1])/seg:0;
          const a=S.path[idx-1],b=S.path[idx];
          head=[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];
          shown[shown.length-1]=head;
        }
        ctx.strokeStyle='#f59e0b';ctx.lineWidth=7*sc;ctx.setLineDash([]);
        ctx.beginPath();
        shown.forEach((p,k)=>{const x=X(p[1]),y=Y(p[0]);k?ctx.lineTo(x,y):ctx.moveTo(x,y);});
        ctx.stroke();
        if(frac<1) runnerHead=head;   // 跑完(100%)就不畫小人，避免杵在終點
      }
    }
    // 7) 方向箭頭：沿整條路線（含筆畫間的連接虛線）標示前進方向，可由選項關閉。
    //    角度直接用 canvas 座標算（已是螢幕座標，不必再處理 Mercator）。
    if(opt.arrows){
      const path=[];
      S.result.segments.forEach(sg=>sg.pts.forEach(p=>{
        const last=path.length?path[path.length-1]:null;
        if(!last||last[0]!==p[0]||last[1]!==p[1]) path.push(p);
      }));
      if(path.length>=2){
        const cum=[0];
        for(let i=1;i<path.length;i++) cum.push(cum[i-1]+map.distance(path[i-1],path[i]));
        const total=cum[cum.length-1]||0;
        const idxAt=dd=>{let lo=0,hi=cum.length-1;while(lo<hi){const m=(lo+hi)>>1;cum[m]<dd?lo=m+1:hi=m;}return lo;};
        const at=dd=>{const i=idxAt(dd);if(i<1)return path[0];
          const seg=cum[i]-cum[i-1],t=seg>0?(dd-cum[i-1])/seg:0,a=path[i-1],b=path[i];
          return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];};
        const step=Math.max(80,total/16);
        // 用和地圖上一樣的箭頭字元 ➤（U+27A4），比正三角形更看得出方向
        const F0='"Segoe UI Symbol","Apple Color Emoji","Noto Sans Symbols",sans-serif';
        for(let d=step;d<total;d+=step){
          const c=at(d), a=at(Math.max(0,d-14)), b=at(Math.min(total,d+14));
          const ax=X(a[1]),ay=Y(a[0]),bx=X(b[1]),by=Y(b[0]);
          if(ax===bx&&ay===by) continue;
          ctx.save();
          ctx.translate(X(c[1]),Y(c[0]));ctx.rotate(Math.atan2(by-ay,bx-ax));
          ctx.font=`${Math.round(27*sc)}px ${F0}`;
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.lineWidth=4*sc;ctx.strokeStyle='rgba(8,8,8,.9)';
          ctx.strokeText('➤',0,0);
          ctx.fillStyle='#fde047';ctx.fillText('➤',0,0);
          ctx.restore();
        }
      }
    }
    // 8) 起終點：綠圈▶＝起點、紅圈■＝終點（與地圖上同一套）
    if(opt.marks){
      const mark=(ll,isStart)=>{
        if(!ll) return;
        const x=X(ll.lng),y=Y(ll.lat),r=15*sc;
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fillStyle=isStart?'#16a34a':'#dc2626';ctx.fill();
        ctx.lineWidth=3*sc;ctx.strokeStyle='#fff';ctx.stroke();
        ctx.fillStyle='#fff';
        if(isStart){
          ctx.beginPath();
          ctx.moveTo(x-r*0.30,y-r*0.42);ctx.lineTo(x+r*0.48,y);ctx.lineTo(x-r*0.30,y+r*0.42);
          ctx.closePath();ctx.fill();
        }else{
          const s2=r*0.66;ctx.fillRect(x-s2/2,y-s2/2,s2,s2);
        }
      };
      mark(S.start,true);mark(S.end,false);
    }
    // 小人畫在走過/未走過的分界（最上層，仍在地圖 clip 內）
    if(runnerHead){
      drawRunnerCanvas(ctx,X(runnerHead[1]),Y(runnerHead[0]),1.3*sc,light);
    }
    ctx.restore();

    // 9) 比例尺
    const cLat=(Math.min(...lats)+Math.max(...lats))/2;
    const mPerPx=156543.03392*Math.cos(cLat*Math.PI/180)/Math.pow(2,z)/K;
    const NICE=[10,20,50,100,200,500,1000,2000,5000];
    let barM=NICE[0];
    for(const v of NICE) if(v/mPerPx<=mapW*0.3) barM=v;
    const barPx=barM/mPerPx, bx=26*sc, by=mapH-26*sc, tick=6*sc;
    const drawBar=()=>{ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+barPx,by);
      ctx.moveTo(bx,by-tick);ctx.lineTo(bx,by+tick);
      ctx.moveTo(bx+barPx,by-tick);ctx.lineTo(bx+barPx,by+tick);ctx.stroke();};
    ctx.strokeStyle=TH.overlayStroke;ctx.lineWidth=6*sc;drawBar();
    ctx.strokeStyle=TH.overlay;ctx.lineWidth=2.5*sc;drawBar();
    const F='"Microsoft JhengHei","PingFang TC",system-ui,sans-serif';
    ctx.font=`600 ${Math.round(30*sc)}px ${F}`;ctx.textBaseline='alphabetic';ctx.textAlign='center';
    const barTxt=barM>=1000?(barM/1000)+' km':barM+' m';
    const barMid=bx+barPx/2;   // 距離文字置中於線段中間
    ctx.lineWidth=5*sc;ctx.strokeStyle=TH.overlayStroke;
    ctx.strokeText(barTxt,barMid,by-14*sc);
    ctx.fillStyle=TH.overlay;ctx.fillText(barTxt,barMid,by-14*sc);

    // 品牌浮水印（地圖區右下角，不搶焦點）
    ctx.font=`600 ${Math.round(24*sc)}px ${F}`;ctx.textAlign='right';
    ctx.lineWidth=4*sc;ctx.strokeStyle=TH.overlayStroke;
    ctx.strokeText('RUNNING ART',mapW-26*sc,mapH-24*sc);
    ctx.globalAlpha=.92;ctx.fillStyle=TH.overlay;ctx.fillText('RUNNING ART',mapW-26*sc,mapH-24*sc);
    ctx.globalAlpha=1;

    // 10) 地點名稱（中山區, 台北市）—— 反向地理編碼，失敗就留空
    const cLon=(Math.min(...lons)+Math.max(...lons))/2;
    busy('查詢地點…');
    const place=await getPlaceName(cLat,cLon);

    // 11) 資訊欄：地點（含大頭針）＋日期一列，四個數據一列
    ctx.fillStyle=TH.infoBg;ctx.fillRect(0,mapH,mapW,infoH);
    ctx.fillStyle=TH.infoLine;ctx.fillRect(0,mapH,mapW,Math.max(2,2*sc));
    const pad=36*sc, top=mapH, rowY=top+infoH*0.23;
    ctx.textBaseline='middle';
    // 上排：大頭針 + 地點（左）＋ 日期（右）
    let placeX=pad;
    if(place){
      const ph=34*sc;
      drawPin(ctx,pad+ph*0.32,rowY+ph*0.5,ph,'#ef4444');
      placeX=pad+ph*0.9;
      ctx.textAlign='left';ctx.fillStyle=TH.textMain;ctx.font=`600 ${Math.round(37*sc)}px ${F}`;
      ctx.fillText(place,placeX,rowY);
    }
    ctx.textAlign='right';ctx.fillStyle=TH.textDim;ctx.font=`400 ${Math.round(28*sc)}px ${F}`;
    ctx.fillText(localDate(),mapW-pad,rowY);

    // 下排：四個數據（含爬升／下降）
    const pm=Math.floor(S.pace), ps=Math.round((S.pace-pm)*60);
    const elevTxt=(S.elevGain!=null)?('↑'+S.elevGain+' ↓'+S.elevLoss+' m'):'–';
    const EL=EXP_LABELS[lang];
    const cells=[[EL[0],$('sDist').textContent],
                 [EL[1],pm+':'+String(ps).padStart(2,'0')+' /km'],
                 [EL[2],$('sTime').textContent],
                 [EL[3],elevTxt]];
    const cw=(mapW-pad*2)/4;
    ctx.textAlign='left';
    cells.forEach((c,n)=>{
      const cx=pad+cw*n;
      ctx.fillStyle=TH.textDim;ctx.font=`400 ${Math.round(25*sc)}px ${F}`;
      ctx.fillText(c[0],cx,top+infoH*0.57);
      // 數值：太寬（例如「↑45 ↓30 m」）就自動縮字級，不要溢出格子
      ctx.fillStyle=TH.textMain;
      let fs=46*sc;
      ctx.font=`600 ${Math.round(fs)}px ${F}`;
      const maxW=cw-10*sc;
      if(ctx.measureText(c[1]).width>maxW){
        fs*=maxW/ctx.measureText(c[1]).width;
        ctx.font=`600 ${Math.round(fs)}px ${F}`;
      }
      ctx.fillText(c[1],cx,top+infoH*0.81);
    });

    // 12) 下載
    const blob=await new Promise(r=>cv.toBlob(r,'image/png'));
    if(!blob) throw new Error('產生圖片失敗');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='RunningArt_'+localDate()+'.png';
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    toast(tx('圖片已下載（'+mapW+'×'+(mapH+infoH)+'）','Image saved ('+mapW+'×'+(mapH+infoH)+')'),2200);
  }catch(err){
    toast(tx('產生圖片失敗：','Image export failed: ')+err.message,3200);
  }finally{ busy(''); }
}
let pngRatio='1:1';
// 匯出對話框的即時預覽：不抓底圖 tile（純色底示意），只即時反映勾選的圖層、
// 比例與跑者進度。真實高畫質底圖在按「產生圖片」時才抓（exportPNG）。
function pngCollectPts(opt){
  const pts=[];
  if(opt.route&&S.result) S.result.segments.forEach(sg=>sg.pts.forEach(p=>pts.push(p)));
  if(opt.draw) S.strokes.forEach(s=>s.pts.forEach(p=>pts.push([p.lat,p.lng])));
  if(!pts.length&&S.result) S.result.segments.forEach(sg=>sg.pts.forEach(p=>pts.push(p)));
  if(opt.marks){ if(S.start)pts.push([S.start.lat,S.start.lng]); if(S.end)pts.push([S.end.lat,S.end.lng]); }
  return pts;
}
function renderPreview(){
  const cv=$('pngPrev'); if(!cv||!S.result) return;
  const opt={route:$('pngRoute').checked,arrows:$('pngArrows').checked,
             draw:$('pngDraw').checked,marks:$('pngMarks').checked};
  const frac=+$('pngProg').value/1000;
  const [RW,RH]=PNG_RATIOS[pngRatio]||PNG_RATIOS['1:1'];
  const W=cv.width, scale=W/RW, H=Math.round(RH*scale); cv.height=H;
  const infoH=INFO_H*scale, mapW=W, mapH=H-infoH, lw=W/1080, light=isLight();
  const TH=light?{mapBg:'#e8ecf1',info:'#ffffff',line:'#dfe4ea',dim:'#cfd4db'}
               :{mapBg:'#0d0f12',info:'#14171c',line:'#2b313b',dim:'#3a4048'};
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=TH.mapBg;ctx.fillRect(0,0,W,mapH);
  const pts=pngCollectPts(opt);
  if(pts.length){
    const lats=pts.map(p=>p[0]),lons=pts.map(p=>p[1]);
    const wx0=lonToWorld(Math.min(...lons),0),wx1=lonToWorld(Math.max(...lons),0);
    const wy0=latToWorld(Math.max(...lats),0),wy1=latToWorld(Math.min(...lats),0);
    const cx=(wx0+wx1)/2,cy=(wy0+wy1)/2;
    const dx=Math.max(wx1-wx0,1e-9),dy=Math.max(wy1-wy0,1e-9);
    const s=Math.min(mapW/dx,mapH/dy)*0.82;
    const X=lon=>mapW/2+(lonToWorld(lon,0)-cx)*s, Y=lat=>mapH/2+(latToWorld(lat,0)-cy)*s;
    ctx.save();ctx.beginPath();ctx.rect(0,0,mapW,mapH);ctx.clip();
    ctx.lineCap=ctx.lineJoin='round';
    if(opt.draw){
      ctx.strokeStyle='#ef4444';ctx.lineWidth=(opt.route?15:5)*lw;ctx.globalAlpha=.9;
      S.strokes.forEach(st=>{ctx.beginPath();st.pts.forEach((p,k)=>{const x=X(p.lng),y=Y(p.lat);k?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();});
      ctx.globalAlpha=1;
    }
    let head=null;
    if(opt.route){
      S.result.segments.forEach(sg=>{const draw=sg.kind==='draw';
        ctx.strokeStyle=draw?'#38bdf8':'#f59e0b';ctx.lineWidth=(draw?7:4)*lw;
        ctx.setLineDash(draw?[]:[10*lw,9*lw]);ctx.beginPath();
        sg.pts.forEach((p,k)=>{const x=X(p[1]),y=Y(p[0]);k?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();});
      ctx.setLineDash([]);
      if(S.path&&S.path.length>1&&S.totalM>0&&frac>0){
        const target=S.totalM*frac;let lo=0,hi=S.cum.length-1;
        while(lo<hi){const m=(lo+hi)>>1;S.cum[m]<target?lo=m+1:hi=m;}
        const idx=lo;const shown=S.path.slice(0,Math.max(idx+1,1)).map(p=>[p[0],p[1]]);
        head=S.path[Math.max(idx,0)];
        if(idx>0){const seg=S.cum[idx]-S.cum[idx-1],t=seg>0?(target-S.cum[idx-1])/seg:0,a=S.path[idx-1],b=S.path[idx];
          head=[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];shown[shown.length-1]=head;}
        ctx.strokeStyle='#f59e0b';ctx.lineWidth=7*lw;ctx.beginPath();
        shown.forEach((p,k)=>{const x=X(p[1]),y=Y(p[0]);k?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();
        if(frac>=1) head=null;
      }
    }
    if(opt.marks){
      const mk=(ll,isStart)=>{if(!ll)return;const x=X(ll.lng),y=Y(ll.lat),r=15*lw;
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=isStart?'#16a34a':'#dc2626';ctx.fill();
        ctx.lineWidth=3*lw;ctx.strokeStyle='#fff';ctx.stroke();ctx.fillStyle='#fff';
        if(isStart){ctx.beginPath();ctx.moveTo(x-r*0.30,y-r*0.42);ctx.lineTo(x+r*0.48,y);ctx.lineTo(x-r*0.30,y+r*0.42);ctx.closePath();ctx.fill();}
        else{const s2=r*0.66;ctx.fillRect(x-s2/2,y-s2/2,s2,s2);}};
      mk(S.start,true);mk(S.end,false);
    }
    if(head) drawRunnerCanvas(ctx,X(head[1]),Y(head[0]),1.3*lw,light);
    ctx.restore();
  }
  // 資訊欄佈局示意（地點條＋四個數據塊）
  ctx.fillStyle=TH.info;ctx.fillRect(0,mapH,W,infoH);
  ctx.fillStyle=TH.line;ctx.fillRect(0,mapH,W,Math.max(1,infoH*0.012));
  ctx.fillStyle=TH.dim;const pd=infoH*0.16;
  ctx.fillRect(pd,mapH+infoH*0.26,W*0.42,infoH*0.11);
  for(let i=0;i<4;i++) ctx.fillRect(pd+i*(W-pd*2)/4,mapH+infoH*0.62,(W-pd*2)/4-pd*0.4,infoH*0.16);
}
document.querySelectorAll('.rt').forEach(b=>b.onclick=()=>{
  pngRatio=b.dataset.ratio;
  document.querySelectorAll('.rt').forEach(x=>x.classList.toggle('on',x===b));
  renderPreview();
});
['pngRoute','pngArrows','pngDraw','pngMarks'].forEach(id=>$(id).addEventListener('change',renderPreview));
$('pngProg').oninput=()=>{
  const pct=+$('pngProg').value/10;
  $('pngProgTxt').textContent=Math.round(pct)+'%';
  $('pngProg').style.background=`linear-gradient(to right,#f59e0b 0%,#f59e0b ${pct}%,#38bdf8 ${pct}%,#38bdf8 100%)`;
  renderPreview();
};
$('aPng').onclick=()=>{
  if(!S.result) return;
  $('pngModal').hidden=false;
  // 進度預設跟隨結果面板當前的拉桿位置
  $('pngProg').value=(typeof S.totalM==='number'&&S.totalM>0)?(+$('pvSlider').value||1000):1000;
  $('pngProg').dispatchEvent(new Event('input'));   // 更新百分比文字、拉桿底色、預覽
};
$('pngCancel').onclick=()=>{ $('pngModal').hidden=true; };
$('pngGo').onclick=()=>{
  $('pngModal').hidden=true;
  exportPNG({ratio:pngRatio,route:$('pngRoute').checked,arrows:$('pngArrows').checked,
             draw:$('pngDraw').checked,marks:$('pngMarks').checked,frac:+$('pngProg').value/1000});
};

el.sheet.querySelector('.grip').onclick=()=>{S.sheetUp=false;el.sheet.classList.remove('up');refresh();};
el.pill.onclick=()=>{
  if(!S.result||S.sheetUp||S.editing) return;
  S.sheetUp=true;el.sheet.classList.add('up');refresh();fitRoute();
};

function busy(t){const b=$('busy');
  if(t){if(EN()&&PROG_EN[t]) t=PROG_EN[t]; $('busyTxt').textContent=t;b.classList.add('on');}
  else b.classList.remove('on');}
Engine.setProgress(busy);
Engine.boot().then(()=>toast('運算引擎已就緒')).catch(e=>toast(tx('引擎載入失敗：','Engine load failed: ')+e.message,3000));

applyLang();
setMode('pan');guide();refresh();
</script>
