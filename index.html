<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Running Art</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;
    font-family:system-ui,-apple-system,"Microsoft JhengHei",sans-serif;
    background:#0d0f12;color:#e8eaed}
  #map{position:absolute;inset:0;background:#0d0f12}
  .leaflet-container{background:#0d0f12}

  /* ---- 頂部 ---- */
  .top{position:absolute;top:0;left:0;right:0;z-index:500;padding:10px 12px;
    display:flex;gap:8px;align-items:center;pointer-events:none}
  .top>*{pointer-events:auto}
  .brand{font-size:15px;font-weight:500;letter-spacing:.5px;
    background:rgba(20,23,28,.82);backdrop-filter:blur(8px);
    border:1px solid #262b33;border-radius:10px;padding:8px 12px}
  .btn-dl{margin-left:auto;display:flex;align-items:center;gap:6px;
    background:rgba(20,23,28,.82);backdrop-filter:blur(8px);
    border:1px solid #262b33;color:#e8eaed;border-radius:10px;
    padding:9px 13px;font-size:13px;font-weight:500}
  .btn-dl.on{background:#2563eb;border-color:#2563eb}

  /* ---- 引導條 ---- */
  .guide{position:absolute;left:12px;right:12px;bottom:150px;z-index:500;
    background:rgba(20,23,28,.9);backdrop-filter:blur(8px);
    border:1px solid #262b33;border-left:3px solid #2563eb;border-radius:10px;
    padding:11px 13px;display:flex;gap:10px;align-items:center;
    transition:opacity .25s,transform .25s}
  .guide.hide{opacity:0;transform:translateY(6px);pointer-events:none}
  .guide .n{width:21px;height:21px;flex:none;border-radius:50%;background:#2563eb;
    color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center}
  .guide p{margin:0;font-size:13px;line-height:1.45;color:#c9cdd3}
  .guide b{color:#fff;font-weight:500}

  /* ---- 底部工具列 ---- */
  .dock{position:absolute;left:12px;right:12px;bottom:12px;z-index:500;
    background:rgba(20,23,28,.92);backdrop-filter:blur(12px);
    border:1px solid #262b33;border-radius:16px;padding:8px;
    display:flex;flex-direction:column;gap:8px}
  .modes{display:flex;gap:6px}
  .m{flex:1;background:transparent;border:0;border-radius:11px;padding:9px 4px;
    color:#8b929c;font-size:11px;font-family:inherit;
    display:flex;flex-direction:column;align-items:center;gap:4px}
  .m svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}
  .m.on{background:#2563eb;color:#fff}
  .m:disabled{opacity:.32}
  .row2{display:flex;gap:6px}
  .sm{background:#171b21;border:1px solid #262b33;border-radius:11px;
    color:#c9cdd3;font-size:12.5px;font-family:inherit;padding:10px 12px;
    display:flex;align-items:center;gap:5px}
  .sm svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}
  .sm:disabled{opacity:.32}
  .go{flex:1;justify-content:center;background:#16a34a;border-color:#16a34a;
    color:#fff;font-weight:500;font-size:14px}
  .go:disabled{background:#171b21;border-color:#262b33;color:#8b929c}
  /* 微調路徑工具列 */
  .dock[hidden]{display:none}
  #editDock .sm{flex:1;justify-content:center}
  .sm.on{background:#2563eb;border-color:#2563eb;color:#fff}
  .sm.danger{background:#dc2626;border-color:#dc2626;color:#fff;font-weight:500}
  .sm.danger:disabled{background:#171b21;border-color:#262b33;color:#8b929c}

  /* ---- 距離膠囊 ---- */
  .pill{position:absolute;top:58px;left:50%;transform:translateX(-50%);z-index:500;
    background:rgba(20,23,28,.88);backdrop-filter:blur(8px);border:1px solid #262b33;
    border-radius:999px;padding:6px 15px;font-size:13px;font-weight:500;
    transition:opacity .2s}
  .pill.hide{opacity:0}

  /* ---- 結果面板 ---- */
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:600;
    background:#14171c;border-top:1px solid #262b33;
    border-radius:18px 18px 0 0;padding:8px 16px 18px;
    transform:translateY(102%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
  .sheet.up{transform:translateY(0)}
  .grip{width:34px;height:4px;background:#3a4048;border-radius:2px;margin:0 auto 14px}
  .stats{display:flex;gap:10px;margin-bottom:14px}
  .stat{flex:1;background:#171b21;border-radius:11px;padding:11px}
  .stat span{display:block;font-size:11.5px;color:#8b929c;margin-bottom:3px}
  .stat b{font-size:19px;font-weight:500}
  .prev{background:#171b21;border-radius:11px;padding:9px 11px;margin-bottom:10px}
  .prow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .prow .lbl{font-size:12.5px;color:#8b929c}
  .prow b{font-size:15px;font-weight:500;margin-left:auto}
  .prow .unit{font-size:11.5px;color:#8b929c;min-width:34px;text-align:right}
  .prow button{width:30px;height:30px;flex:none;border-radius:8px;border:1px solid #262b33;
    background:#0f1216;color:#e8eaed;font-size:13px;font-family:inherit;line-height:1}
  #pvSlider{width:100%;margin:0;accent-color:#38bdf8}
  .pace{display:flex;align-items:center;gap:8px;background:#171b21;border-radius:11px;
    padding:8px 11px;margin-bottom:10px}
  .pace .lbl{font-size:12.5px;color:#8b929c}
  .pace button{width:30px;height:30px;flex:none;border-radius:8px;border:1px solid #262b33;
    background:#0f1216;color:#e8eaed;font-size:17px;font-family:inherit;line-height:1}
  .pace b{font-size:16px;font-weight:500;min-width:44px;text-align:center}
  .pace .unit{font-size:11.5px;color:#8b929c}
  .pace .hint{margin-left:auto;font-size:11.5px;color:#8b929c}
  .acts{display:flex;gap:8px}
  .acts button{flex:1;padding:12px;border-radius:11px;font-size:13.5px;
    font-family:inherit;font-weight:500;border:1px solid #262b33;
    background:#171b21;color:#e8eaed;display:flex;align-items:center;
    justify-content:center;gap:6px}
  .acts .pri{background:#2563eb;border-color:#2563eb}
  .acts svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}

  .toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:900;
    background:rgba(20,23,28,.95);border:1px solid #262b33;border-radius:12px;
    padding:15px 20px;font-size:13.5px;text-align:center;opacity:0;
    transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .busy{position:absolute;top:0;left:0;right:0;z-index:800;display:none;
    align-items:center;gap:9px;justify-content:center;padding:10px;
    background:rgba(13,15,18,.94);border-bottom:1px solid #262b33;font-size:13px}
  .busy.on{display:flex}
  .spin{width:14px;height:14px;border:2px solid #2563eb;border-top-color:transparent;
    border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .box{position:absolute;border:2px dashed #2563eb;background:rgba(37,99,235,.14);
    z-index:450;pointer-events:none;border-radius:4px}
</style>
</head>
<body>
<div id="map"></div>

<div class="top">
  <div class="brand">Running Art</div>
  <button class="btn-dl" id="btnDl">
    <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
    <span id="dlLabel">下載地圖</span>
  </button>
</div>

<div class="pill hide" id="pill">0.00 km</div>

<div class="guide" id="guide">
  <div class="n" id="gn">1</div>
  <p id="gt"></p>
</div>

<div class="dock" id="mainDock">
  <div class="modes">
    <button class="m on" data-mode="pan" id="mPan">
      <svg viewBox="0 0 24 24"><path d="M8 13V5a1.5 1.5 0 013 0v6m0-1V4a1.5 1.5 0 013 0v6m0 0V6a1.5 1.5 0 013 0v7m0-2a1.5 1.5 0 013 0v4a7 7 0 01-7 7h-1a7 7 0 01-7-7v-1a1.5 1.5 0 013-1"/></svg>
      移動
    </button>
    <button class="m" data-mode="draw" id="mDraw" disabled>
      <svg viewBox="0 0 24 24"><path d="M4 20h4L19 9a2.8 2.8 0 00-4-4L4 16v4z"/></svg>
      畫圖
    </button>
    <button class="m" data-mode="start" id="mStart" disabled>
      <svg viewBox="0 0 24 24"><path d="M12 21s7-5.6 7-11a7 7 0 10-14 0c0 5.4 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
      起點
    </button>
    <button class="m" data-mode="end" id="mEnd" disabled>
      <svg viewBox="0 0 24 24"><path d="M5 21V4m0 0l9 3-9 3"/><path d="M5 7h13l-3 4 3 4H5"/></svg>
      終點
    </button>
  </div>
  <div class="row2">
    <button class="sm" id="btnUndo" disabled>
      <svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 010 10h-4"/></svg>復原
    </button>
    <button class="sm" id="btnClear" disabled>
      <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>清除
    </button>
    <button class="sm go" id="btnGo" disabled>
      <svg viewBox="0 0 24 24"><path d="M13 4l-1.5 4.5L15 11l-4 2 1 7-6-8 3-1-2-3 6-4z"/></svg>生成路線
    </button>
  </div>
</div>

<div class="dock" id="editDock" hidden>
  <div class="row2">
    <button class="sm" id="eBox">
      <svg viewBox="0 0 24 24"><path d="M4 8V5a1 1 0 011-1h3M16 4h3a1 1 0 011 1v3M20 16v3a1 1 0 01-1 1h-3M8 20H5a1 1 0 01-1-1v-3"/></svg>框選
    </button>
    <button class="sm" id="eNone" disabled>
      <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>取消選取
    </button>
    <button class="sm" id="eUndo" disabled>
      <svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 010 10h-4"/></svg>復原
    </button>
  </div>
  <div class="row2">
    <button class="sm danger" id="eDel" disabled>
      <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>刪除選取
    </button>
    <button class="sm go" id="eDone">
      <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>完成
    </button>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="grip"></div>
  <div class="stats">
    <div class="stat"><span>路線距離</span><b id="sDist">–</b></div>
    <div class="stat"><span>與圖形吻合</span><b id="sFit">–</b></div>
    <div class="stat"><span>預估時間</span><b id="sTime">–</b></div>
  </div>
  <div class="prev">
    <div class="prow">
      <span class="lbl">路線預覽</span>
      <b id="pvAt">0.00 km</b>
      <span class="unit" id="pvPct">0%</span>
      <button id="pvPlay" aria-label="播放路線">▶</button>
    </div>
    <input type="range" id="pvSlider" min="0" max="1000" value="0" step="1">
  </div>
  <div class="pace">
    <span class="lbl">配速</span>
    <button id="pDn" aria-label="配速調慢">−</button>
    <b id="pVal">6:00</b><span class="unit">分/公里</span>
    <button id="pUp" aria-label="配速調快">+</button>
    <span class="hint" id="pHint">慢跑</span>
  </div>
  <div class="acts">
    <button id="aEdit"><svg viewBox="0 0 24 24"><path d="M4 20h4L19 9a2.8 2.8 0 00-4-4L4 16v4z"/></svg>微調路徑</button>
    <button class="pri" id="aGpx"><svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>下載 GPX</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="busy" id="busy"><div class="spin"></div><span id="busyTxt"></span></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<!-- 帶版本參數，否則改了 engine.js 瀏覽器仍會沿用快取的舊引擎 -->
<script src="engine.js?v=20260723b"></script>
<script>
const map=L.map('map',{zoomControl:false,attributionControl:false}).setView([25.0610,121.5330],16);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);

const S={mode:'pan',hasMap:false,strokes:[],cur:null,start:null,end:null,
         boxing:false,generated:false,sheetUp:false,step:1,bounds:null,warned:0,
         editing:false,ebox:false,eDown:null,sel:new Set()};
const $=id=>document.getElementById(id);
const el={guide:$('guide'),gn:$('gn'),gt:$('gt'),pill:$('pill'),sheet:$('sheet'),toast:$('toast')};
let routeLayer=null,startMk=null,endMk=null,boxEl=null,boxA=null;

const STEPS={
 1:['先框選要下載的地圖範圍','點右上角 <b>下載地圖</b>，然後在地圖上拖曳一個方框'],
 2:['畫出你想要的圖案','點下方 <b>畫圖</b>，在<b>藍色框線內</b>畫。畫錯可以按復原'],
 3:['設定起點與終點','點 <b>起點</b> 後在地圖上點一下，終點同理'],
 4:['準備好了','按 <b>生成路線</b>，把圖案對齊到真實道路'],
 5:['完成','可以下載 GPX 匯入 Strava／Garmin 照著跑']
};
function guide(){
  const s=STEPS[S.step];
  // 結果面板升起時，引導條與距離膠囊都讓位，避免互相遮擋
  if(S.sheetUp||!s){el.guide.classList.add('hide');return;}
  el.guide.classList.remove('hide');
  el.gn.textContent=S.step;
  el.gt.innerHTML='<b>'+s[0]+'</b><br>'+s[1];
}
function toast(t,ms=1500){
  el.toast.textContent=t;el.toast.classList.add('show');
  setTimeout(()=>el.toast.classList.remove('show'),ms);
}
// 把「已下載範圍」永久標示在底圖上：框線 + 框外變暗，
// 使用者一眼就知道自己能畫到哪裡。
function showArea(b){
  const W=[[90,-180],[90,180],[-90,180],[-90,-180]];
  const hole=[b.getNorthWest(),b.getNorthEast(),b.getSouthEast(),b.getSouthWest()];
  L.polygon([W,hole],{stroke:false,fillColor:'#05070a',fillOpacity:.55,interactive:false}).addTo(map);
  L.rectangle(b,{color:'#38bdf8',weight:2,dashArray:'7 5',fill:false,interactive:false}).addTo(map);
  map.fitBounds(b,{padding:[26,26]});
}
function inArea(ll){return !S.bounds||S.bounds.contains(ll);}

function setMode(m){
  if(m!=='pan'&&!S.hasMap) return;
  S.mode=m;
  document.querySelectorAll('.m').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));
  // 模式切換：只有「移動」模式能拖曳地圖
  if(m==='pan'){map.dragging.enable();}else{map.dragging.disable();}
  map.getContainer().style.cursor = m==='pan'?'grab':'crosshair';
}
document.querySelectorAll('.m').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));

/* 拖曳畫框（下載範圍與微調框選共用） */
function boxBegin(e){
  boxA=[e.clientX,e.clientY];
  boxEl=document.createElement('div');boxEl.className='box';document.body.appendChild(boxEl);
}
function boxDrag(e){
  if(!boxA||!boxEl) return;
  const x=Math.min(boxA[0],e.clientX),y=Math.min(boxA[1],e.clientY);
  boxEl.style.cssText+=`;left:${x}px;top:${y}px;width:${Math.abs(e.clientX-boxA[0])}px;height:${Math.abs(e.clientY-boxA[1])}px`;
}
/* 收框，回傳 {x0,y0,x1,y1}（相對地圖容器）；沒在畫框就回傳 null */
function boxEnd(e){
  if(!boxA) return null;
  const a=boxA;boxA=null;
  if(boxEl){boxEl.remove();boxEl=null;}
  const r=mc.getBoundingClientRect();
  return {x0:Math.min(a[0],e.clientX)-r.left, y0:Math.min(a[1],e.clientY)-r.top,
          x1:Math.max(a[0],e.clientX)-r.left, y1:Math.max(a[1],e.clientY)-r.top};
}

function refresh(){
  if(S.editing) return;   // 微調模式有自己的一套按鈕與提示
  const n=S.strokes.length;
  $('btnUndo').disabled=!n; $('btnClear').disabled=!n;
  $('btnGo').disabled=!(n&&S.start&&S.end);
  let d=0;
  for(const s of S.strokes) for(let i=1;i<s.pts.length;i++) d+=map.distance(s.pts[i-1],s.pts[i]);
  if(n&&!S.sheetUp){el.pill.classList.remove('hide');el.pill.textContent=(d/1000).toFixed(2)+' km';}
  else el.pill.classList.add('hide');
  // 引導自動推進，不需要使用者點「下一步」
  let st=1;
  if(S.hasMap) st=2;
  if(S.hasMap&&n) st=3;
  if(S.hasMap&&n&&S.start&&S.end) st=4;
  if(S.generated) st=5;
  if(st!==S.step){S.step=st;guide();}
}

/* ---------- 框選下載 ---------- */
$('btnDl').onclick=()=>{
  S.boxing=!S.boxing;
  $('btnDl').classList.toggle('on',S.boxing);
  $('dlLabel').textContent=S.boxing?'取消框選':'下載地圖';
  map.dragging[S.boxing?'disable':'enable']();
  if(S.boxing) toast('在地圖上拖曳一個方框',1800);
};
const mc=map.getContainer();
mc.addEventListener('pointerdown',e=>{
  if(S.editing){
    S.eDown=[e.clientX,e.clientY];
    if(S.ebox) boxBegin(e);
    return;
  }
  if(S.boxing){
    boxBegin(e);
    return;
  }
  if(S.mode==='draw'&&S.hasMap){
    const ll=map.mouseEventToLatLng(e);
    if(!inArea(ll)){toast('請在藍色框線內畫圖');return;}
    S.cur=[ll];
    S.curLine=L.polyline(S.cur,{color:'#ef4444',weight:5,opacity:.95}).addTo(map);
  }
});
mc.addEventListener('pointermove',e=>{
  if(S.editing){
    if(S.ebox) boxDrag(e);
    return;
  }
  if(S.boxing){
    boxDrag(e);
    return;
  }
  if(S.mode==='draw'&&S.cur){
    const ll=map.mouseEventToLatLng(e);
    if(!inArea(ll)){
      if(Date.now()-S.warned>1600){S.warned=Date.now();toast('超出已下載範圍');}
      return;
    }
    S.cur.push(ll);S.curLine.setLatLngs(S.cur);
  }
});
mc.addEventListener('pointerup',e=>{
  if(S.editing){
    const d=S.eDown;S.eDown=null;
    if(S.ebox){
      const r=boxEnd(e);
      if(r) editBoxSelect(r);
      return;
    }
    // 移動超過 8px 視為在拖曳地圖，不當成點選節點
    if(d&&Math.hypot(e.clientX-d[0],e.clientY-d[1])<=8) editPick(map.mouseEventToLatLng(e));
    return;
  }
  if(S.boxing&&boxA){
    const r=boxEnd(e);
    if(r&&r.x1-r.x0>30&&r.y1-r.y0>30){
      const p1=map.containerPointToLatLng([r.x0,r.y0]);
      const p2=map.containerPointToLatLng([r.x1,r.y1]);
      const bounds=L.latLngBounds(p1,p2);
      S.boxing=false;$('btnDl').classList.remove('on');
      const km=(map.distance(bounds.getNorthWest(),bounds.getNorthEast())/1000)
             *(map.distance(bounds.getNorthWest(),bounds.getSouthWest())/1000);
      $('dlLabel').textContent='下載中…';
      Engine.loadArea(bounds.getSouth(),bounds.getWest(),bounds.getNorth(),bounds.getEast())
        .then(st=>{
          S.hasMap=true;S.bounds=bounds;
          showArea(bounds);
          $('dlLabel').textContent=km.toFixed(1)+' km²';
          ['mDraw','mStart','mEnd'].forEach(i=>$(i).disabled=false);
          toast('路網已載入（'+st.nodes+' 個路口）');setMode('draw');refresh();
        })
        .catch(err=>{busy('');$('dlLabel').textContent='下載地圖';toast(err.message,3000);});
    }
    return;
  }
  if(S.mode==='draw'&&S.cur){
    if(S.cur.length>3) S.strokes.push({pts:S.cur,line:S.curLine});
    else S.curLine.remove();
    S.cur=null;S.curLine=null;refresh();
  }
});
map.on('click',e=>{
  if(S.editing) return;   // 微調模式的點選由 pointerup 處理
  if((S.mode==='start'||S.mode==='end')&&!inArea(e.latlng)){
    toast('起點／終點要在藍色框線內');return;
  }
  if(S.mode==='start'){
    if(startMk) startMk.remove();
    startMk=L.circleMarker(e.latlng,{radius:9,color:'#fff',weight:2.5,fillColor:'#a855f7',fillOpacity:1}).addTo(map);
    S.start=e.latlng;toast('起點已設定');refresh();
  }else if(S.mode==='end'){
    if(endMk) endMk.remove();
    endMk=L.circleMarker(e.latlng,{radius:9,color:'#fff',weight:2.5,fillColor:'#ec4899',fillOpacity:1}).addTo(map);
    S.end=e.latlng;toast('終點已設定');refresh();
  }
});

$('btnUndo').onclick=()=>{const s=S.strokes.pop();if(s)s.line.remove();refresh();};
$('btnClear').onclick=()=>{
  S.strokes.forEach(s=>s.line.remove());S.strokes=[];
  if(routeLayer){routeLayer.remove();routeLayer=null;}
  pvClear();S.path=null;S.result=null;
  S.generated=false;S.sheetUp=false;el.sheet.classList.remove('up');refresh();
};

/* ---------- 生成（原型：假資料） ---------- */
/* ---------- 路線預覽（拉桿 + 方向） ---------- */
let pvDone=null,pvHead=null,pvArrows=null,pvTimer=null;
function pvBuild(res){
  // 把所有分段串成一條連續路徑，並累計距離
  S.path=[];
  res.segments.forEach(sg=>sg.pts.forEach(p=>{
    const last=S.path.length?S.path[S.path.length-1]:null;
    if(!last||last[0]!==p[0]||last[1]!==p[1]) S.path.push(p);
  }));
  S.cum=[0];
  for(let i=1;i<S.path.length;i++)
    S.cum.push(S.cum[i-1]+map.distance(S.path[i-1],S.path[i]));
  S.totalM=S.cum[S.cum.length-1]||0;

  [pvDone,pvHead,pvArrows].forEach(l=>{if(l)l.remove();});
  pvDone=L.polyline([],{color:'#f59e0b',weight:7,opacity:.95}).addTo(map);
  pvHead=L.circleMarker(S.path[0],{radius:8,color:'#fff',weight:2.5,
          fillColor:'#f59e0b',fillOpacity:1}).addTo(map);
  // 沿線每隔一段放一個方向箭頭
  const arrows=[],step=Math.max(120,S.totalM/14);
  for(let d=step;d<S.totalM;d+=step){
    const i=pvIndexAt(d);
    if(i<1) continue;
    const a=S.path[i-1],b=S.path[i];
    const ang=Math.atan2(b[1]-a[1],b[0]-a[0])*180/Math.PI;
    arrows.push(L.marker(b,{interactive:false,icon:L.divIcon({className:'',
      iconSize:[16,16],iconAnchor:[8,8],
      html:'<div style="transform:rotate('+(90-ang)+'deg);color:#38bdf8;font-size:15px;line-height:16px;text-align:center;text-shadow:0 0 3px #000">&#10148;</div>'})}));
  }
  pvArrows=L.layerGroup(arrows).addTo(map);
  $('pvSlider').value=0; pvSet(0);
}
function pvIndexAt(dist){
  let lo=0,hi=S.cum.length-1;
  while(lo<hi){const mid=(lo+hi)>>1; if(S.cum[mid]<dist) lo=mid+1; else hi=mid;}
  return lo;
}
function pvSet(frac){
  if(!S.path||!S.path.length) return;
  const target=S.totalM*frac;
  const i=pvIndexAt(target);
  const shown=S.path.slice(0,Math.max(i+1,1));
  // 在最後一段上做內插，讓拉桿移動是連續的
  let head=S.path[Math.max(i,0)];
  if(i>0){
    const seg=S.cum[i]-S.cum[i-1];
    const t=seg>0?(target-S.cum[i-1])/seg:0;
    const a=S.path[i-1],b=S.path[i];
    head=[a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
    shown[shown.length-1]=head;
  }
  pvDone.setLatLngs(shown);
  pvHead.setLatLng(head);
  $('pvAt').textContent=(target/1000).toFixed(2)+' km';
  $('pvPct').textContent=Math.round(frac*100)+'%';
}
$('pvSlider').oninput=e=>{pvStop();pvSet(+e.target.value/1000);};
function pvStop(){if(pvTimer){clearInterval(pvTimer);pvTimer=null;$('pvPlay').textContent='▶';}}
$('pvPlay').onclick=()=>{
  if(pvTimer){pvStop();return;}
  if(+$('pvSlider').value>=1000) $('pvSlider').value=0;
  $('pvPlay').textContent='⏸';
  pvTimer=setInterval(()=>{
    let v=+$('pvSlider').value+8;
    if(v>=1000){v=1000;pvStop();}
    $('pvSlider').value=v;pvSet(v/1000);
  },40);
};

/* ---------- 配速（可調，會記住） ---------- */
S.pace=parseFloat(localStorage.getItem('runart_pace'))||6;   // 分鐘/公里
S.km=0;
function paceName(p){
  if(p<=4.5) return '競速';
  if(p<=6.5) return '慢跑';
  if(p<=9)   return '輕鬆跑';
  return '快走';
}
function paceUI(){
  const m=Math.floor(S.pace), sec=Math.round((S.pace-m)*60);
  $('pVal').textContent=m+':'+String(sec).padStart(2,'0');
  $('pHint').textContent=paceName(S.pace);
  const t=S.km*S.pace;
  let txt='–';
  if(S.km){
    if(t<60) txt=Math.round(t)+' 分';
    else{
      const h=Math.floor(t/60), mm=Math.round(t%60);
      txt = mm ? h+' 小時 '+mm+' 分' : h+' 小時';
    }
  }
  $('sTime').textContent=txt;
  localStorage.setItem('runart_pace',S.pace);
}
$('pDn').onclick=()=>{S.pace=Math.min(15,+(S.pace+0.5).toFixed(1));paceUI();};
$('pUp').onclick=()=>{S.pace=Math.max(3,+(S.pace-0.5).toFixed(1));paceUI();};
paceUI();

/* ---------- 生成（真實運算） ---------- */
/* 套用一份運算結果（生成與微調共用）。微調時不重建預覽，
   否則預覽圖層會蓋住要點選的節點。 */
function applyResult(res,withPreview=true){
  S.result=res;
  if(routeLayer) routeLayer.remove();
  routeLayer=L.layerGroup(res.segments.map(sg=>L.polyline(sg.pts,{
    color: sg.kind==='draw' ? '#38bdf8' : '#9aa4b2',
    weight: sg.kind==='draw' ? 6 : 3,
    opacity:.95,
    dashArray: sg.kind==='draw' ? null : '6 6'
  }))).addTo(map);
  S.km=res.total_m/1000;
  $('sDist').textContent=S.km.toFixed(2)+' km';
  $('sFit').textContent=Math.round(res.fit)+'%';
  paceUI();
  if(withPreview) pvBuild(res);
}
function pvClear(){
  pvStop();
  [pvDone,pvHead,pvArrows].forEach(l=>{if(l)l.remove();});
  pvDone=pvHead=pvArrows=null;
}
$('btnGo').onclick=()=>{
  const strokes=S.strokes.map(s=>s.pts.map(p=>[p.lat,p.lng]));
  Engine.generate(strokes,[S.start.lat,S.start.lng],[S.end.lat,S.end.lng])
    .then(res=>{
      applyResult(res);
      S.strokes.forEach(s=>s.line.setStyle({opacity:.25,weight:3}));
      S.generated=true;S.sheetUp=true;el.sheet.classList.add('up');refresh();
    })
    .catch(err=>{busy('');toast('生成失敗：'+err.message,3000);});
};

/* ---------- 微調路徑 ---------- */
/* 節點畫在 canvas 上（幾百個 SVG 圓在手機上會很鈍），
   點選則自己算最近節點，不靠 marker 的點擊事件 —— 手指才好按。 */
const nodeRenderer=L.canvas({padding:.3});
const NODE_R=5, NODE_SEL_R=8, PICK_TOL_PX=24;
let nodeLayer=null, nodeMks=[];

function editBuild(){
  if(nodeLayer) nodeLayer.remove();
  nodeMks=[];S.sel.clear();
  const marks=[];
  for(const sg of S.result.segments){
    (sg.nodes||[]).forEach((ll,n)=>{
      if(!ll) return;   // null 佔位：這個節點不在路網裡，不能編輯
      const mk=L.circleMarker(ll,{renderer:nodeRenderer,interactive:false,
        radius:NODE_R,color:'#facc15',weight:1,fillColor:'#facc15',fillOpacity:.9});
      nodeMks.push({si:sg.si,n,ll,mk});
      marks.push(mk);
    });
  }
  nodeLayer=L.layerGroup(marks).addTo(map);
  editUI();
}
function editMark(i,on){
  nodeMks[i].mk.setStyle({radius:on?NODE_SEL_R:NODE_R,
    color:on?'#ef4444':'#facc15',fillColor:on?'#ef4444':'#facc15'});
}
function editUI(){
  const n=S.sel.size;
  $('eDel').disabled=!n;$('eNone').disabled=!n;
  $('eUndo').disabled=!(S.result&&S.result.undo);
  el.pill.classList.remove('hide');
  el.pill.textContent=n?('已選 '+n+' 個節點'):(nodeMks.length+' 個可調整的節點');
}
function editPick(ll){
  const p0=map.latLngToContainerPoint(ll);
  let best=-1,bd=1e9;
  nodeMks.forEach((d,i)=>{
    const p=map.latLngToContainerPoint(d.ll);
    const dist=Math.hypot(p.x-p0.x,p.y-p0.y);
    if(dist<bd){bd=dist;best=i;}
  });
  if(best<0||bd>PICK_TOL_PX) return;
  if(S.sel.has(best)) S.sel.delete(best); else S.sel.add(best);
  editMark(best,S.sel.has(best));editUI();
}
function editBoxSelect(r){
  if(r.x1-r.x0<6&&r.y1-r.y0<6) return;
  nodeMks.forEach((d,i)=>{
    if(S.sel.has(i)) return;
    const p=map.latLngToContainerPoint(d.ll);
    if(p.x>=r.x0&&p.x<=r.x1&&p.y>=r.y0&&p.y<=r.y1){S.sel.add(i);editMark(i,true);}
  });
  editUI();
}
$('aEdit').onclick=()=>{
  if(!S.result) return;
  S.editing=true;S.ebox=false;$('eBox').classList.remove('on');
  S.sheetUp=false;el.sheet.classList.remove('up');
  pvClear();
  $('mainDock').hidden=true;$('editDock').hidden=false;
  setMode('pan');map.dragging.enable();
  editBuild();
  toast('點一下節點選取，或用「框選」一次選多個',2600);
};
$('eBox').onclick=()=>{
  S.ebox=!S.ebox;
  $('eBox').classList.toggle('on',S.ebox);
  map.dragging[S.ebox?'disable':'enable']();
  toast(S.ebox?'拖曳框住要刪除的節點':'改回點擊選取，可拖曳地圖',1600);
};
$('eNone').onclick=()=>{
  S.sel.forEach(i=>editMark(i,false));S.sel.clear();editUI();
};
$('eDel').onclick=()=>{
  if(!S.sel.size) return;
  const picks=[...S.sel].map(i=>({si:nodeMks[i].si,n:nodeMks[i].n}));
  Engine.editDelete(picks)
    .then(res=>{
      if(!res.ok){
        toast(res.reason==='break'
          ? '刪掉這些節點後找不到別條路可以繞過去，已自動復原。試著把整段繞路一起框選刪除。'
          : '無法刪除：這一段剩下的點太少了。',3400);
        return;
      }
      applyResult(res,false);editBuild();
      toast('已重新沿道路接好',1400);
    })
    .catch(err=>{busy('');toast('刪除失敗：'+err.message,3000);});
};
$('eUndo').onclick=()=>{
  Engine.editUndo()
    .then(res=>{
      if(!res.ok){toast('沒有可復原的步驟');return;}
      applyResult(res,false);editBuild();
    })
    .catch(err=>toast('復原失敗：'+err.message,3000));
};
$('eDone').onclick=()=>{
  S.editing=false;S.ebox=false;$('eBox').classList.remove('on');
  map.dragging.enable();
  if(nodeLayer){nodeLayer.remove();nodeLayer=null;}
  nodeMks=[];S.sel.clear();
  $('mainDock').hidden=false;$('editDock').hidden=true;
  pvBuild(S.result);
  S.sheetUp=true;el.sheet.classList.add('up');
  el.pill.classList.add('hide');
  refresh();
};
$('aGpx').onclick=()=>{
  if(!S.result) return;
  const blob=new Blob([Engine.toGPX(S.result.segments)],{type:'application/gpx+xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='RunningArt_'+new Date().toISOString().slice(0,10)+'.gpx';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  toast('GPX 已下載');
};
el.sheet.querySelector('.grip').onclick=()=>{S.sheetUp=false;el.sheet.classList.remove('up');refresh();};

function busy(t){const b=$('busy');if(t){$('busyTxt').textContent=t;b.classList.add('on');}else b.classList.remove('on');}
Engine.setProgress(busy);
Engine.boot().then(()=>toast('運算引擎已就緒')).catch(e=>toast('引擎載入失敗：'+e.message,3000));

setMode('pan');guide();refresh();
</script>
</body>
